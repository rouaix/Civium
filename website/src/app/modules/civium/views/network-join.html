<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitation Civium</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md w-full">
    <div class="text-3xl font-bold text-indigo-700 mb-6">Civium</div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <div class="text-4xl mb-4">🎉</div>
      <h1 class="text-lg font-semibold text-gray-800 mb-3">Invitation acceptée</h1>
      <p class="text-sm text-gray-500 mb-2">
        Votre invitation pour <strong>{{ @invitation_email }}</strong> a bien été validée.
      </p>
      <p class="text-sm text-gray-500 mb-8">
        Connectez-vous maintenant avec votre adresse e-mail pour configurer votre identité et accéder au réseau.
      </p>
      <a href="{{ @base }}/auth"
         class="block w-full bg-indigo-600 text-white font-medium rounded-lg px-4 py-2.5 hover:bg-indigo-700 transition-colors text-center">
        Se connecter
      </a>
    </div>
  </div>
</body>
</html>
