<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ @title }}</title>
  <link rel="icon" href="{{ @BASE }}/public/img/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="{{ @BASE }}/public/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script defer
    src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
    integrity="sha384-9Ax3MmS9AClxJyd5/zafcXXjxmwFhZCdsT6HJoJjarvCaAkJlk5QDzjLJm+Wdx5F"
    crossorigin="anonymous"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl-fast.min.js"
    integrity="sha384-05+sicyRJQ56XpL4U9HJ8YbtSzFDvAg7apPKOGV6A0JsAJKFM68jp5oLnUjG5mEp"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" crossorigin="anonymous"></script>
  <script type="module">
    import { blake3 } from 'https://esm.sh/@noble/hashes@1/blake3';
    window._blake3 = blake3;
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/civium/sw.js', { scope: '/civium/' })
        .catch(function(e) { console.warn('SW registration failed:', e); });
    }
  </script>
  <script>
    // Global error handler — captures JS crashes and unhandled promise rejections
    // and shows a visible banner rather than silently failing.
    (function () {
      function showError(msg) {
        var el = document.getElementById('_civium_err');
        if (!el) {
          el = document.createElement('div');
          el.id = '_civium_err';
          el.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;' +
            'background:#7f1d1d;color:#fef2f2;padding:0.75rem 1rem;font-size:0.85rem;' +
            'display:flex;gap:1rem;align-items:center;border-top:2px solid #b91c1c';
          el.innerHTML = '<span style="flex:1">⚠️ Erreur : ' + msg + '</span>' +
            '<button onclick="this.parentElement.remove()" style="background:none;border:none;' +
            'color:inherit;cursor:pointer;font-size:1.1rem" aria-label="Fermer">✕</button>';
          document.body ? document.body.appendChild(el) : document.addEventListener('DOMContentLoaded', function () { document.body.appendChild(el); });
        }
      }
      window.addEventListener('error', function (e) { showError(e.message || 'Erreur JavaScript'); });
      window.addEventListener('unhandledrejection', function (e) { showError((e.reason && e.reason.message) || String(e.reason) || 'Promesse rejetée'); });
    })();
  </script>
  <style>
    :root {
      --bg:         #0f1117;
      --bg-surf:    #111827;
      --bg-elev:    #1a1d27;
      --border:     #2d3148;
      --border-sub: #1e2235;
      --text:       #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim:   #64748b;
      --text-faint: #475569;
      --accent:     #a5b4fc;
      --primary:    #6366f1;
      --primary-h:  #4f46e5;
      --mine-bg:    #312e81;
      --mine-bdr:   #4338ca;
      --mine-text:  #e0e7ff;
      --bb-bg:      #1e3a5f;
      --bb-fg:      #93c5fd;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f8fafc;
        --bg-surf:    #f1f5f9;
        --bg-elev:    #ffffff;
        --border:     #cbd5e1;
        --border-sub: #e2e8f0;
        --text:       #0f172a;
        --text-muted: #475569;
        --text-dim:   #64748b;
        --text-faint: #94a3b8;
        --accent:     #4f46e5;
        --primary:    #6366f1;
        --primary-h:  #4338ca;
        --mine-bg:    #4338ca;
        --mine-bdr:   #6366f1;
        --mine-text:  #eef2ff;
        --bb-bg:      #dbeafe;
        --bb-fg:      #1d4ed8;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text); height: 100%; display: flex; flex-direction: column;
    }
    [x-cloak] { display: none !important; }

    /* ── Overlay ── */
    .overlay {
      position: fixed; inset: 0; z-index: 50;
      background: color-mix(in srgb, var(--bg) 93%, transparent); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .card {
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px;
      padding: 2rem; width: 100%; max-width: 440px;
    }
    .card h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.5rem; }
    .card p  { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.55; }

    /* ── App layout ── */
    .app-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--bg-surf); border-right: 1px solid var(--border-sub);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border-sub);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title { font-weight: 700; font-size: 1.05rem; }
    .sidebar-add {
      background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 1.3rem; line-height: 1; padding: 0.1rem 0.3rem; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .sidebar-add:hover { color: var(--text); background: var(--border-sub); }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 0.75rem 0.625rem; }
    .net-item {
      width: 100%; text-align: left; background: none; border: none; color: var(--text-muted);
      padding: 0.5rem 0.625rem; border-radius: 8px; cursor: pointer;
      transition: background 0.12s, color 0.12s; font-size: 0.875rem;
    }
    .net-item.active, .net-item:hover { background: var(--border-sub); color: var(--text); }
    .net-item.active { color: var(--accent); }
    .net-name { font-weight: 500; display: flex; align-items: center; gap: 0.4rem; }
    .net-sub  { font-size: 0.75rem; color: var(--text-faint); margin-top: 0.1rem; }
    .view-item {
      width: 100%; text-align: left; background: none; border: none;
      color: var(--text-dim); padding: 0.35rem 0.5rem 0.35rem 1.75rem;
      border-radius: 6px; cursor: pointer; font-size: 0.8rem;
      transition: background 0.12s, color 0.12s; display: flex; align-items: center; gap: 0.5rem;
    }
    .view-item.active, .view-item:hover { background: var(--border-sub); color: var(--accent); }
    .sidebar-footer {
      padding: 0.75rem 1.25rem; border-top: 1px solid var(--border-sub);
      display: flex; align-items: center; justify-content: space-between;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .btn-settings {
      font-size: 0.75rem; background: none; border: none;
      color: var(--text-dim); cursor: pointer; padding: 0.3rem 0.6rem; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-settings:hover { color: var(--text); background: var(--border-sub); }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; }
    .panel { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    .panel-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
    .panel-sub { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1.5rem; }

    /* ── Forms ── */
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.35rem; }
    input[type="text"], input[type="password"], input[type="email"], textarea, select {
      width: 100%; padding: 0.65rem 0.875rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.9rem; outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); }
    input::placeholder, textarea::placeholder { color: var(--text-faint); }
    textarea { resize: vertical; font-family: inherit; }
    .btn {
      padding: 0.65rem 1.25rem; border-radius: 8px; border: none;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text-faint); }
    .btn-full { width: 100%; margin-top: 0.25rem; }
    .btn-sm { padding: 0.4rem 0.875rem; font-size: 0.8rem; }
    .btn-red { background: #dc2626; color: #fff; }
    .btn-red:hover:not(:disabled) { background: #b91c1c; }

    /* ── Alerts ── */
    .msg { padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
    .msg-err  { background: #7f1d1d22; border: 1px solid #dc262655; color: #f87171; }
    .msg-ok   { background: #14532d22; border: 1px solid #16a34a55; color: #4ade80; }
    .msg-info { background: color-mix(in srgb, var(--bb-bg) 13%, transparent); border: 1px solid color-mix(in srgb, var(--bb-fg) 27%, transparent); color: var(--bb-fg); }

    /* ── Message thread ── */
    .msg-thread {
      background: var(--bg-surf); border: 1px solid var(--border-sub); border-radius: 12px;
      display: flex; flex-direction: column; min-height: 320px; max-height: 60vh;
    }
    .msg-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg-bubble {
      display: flex; gap: 0.75rem; align-items: flex-start;
    }
    .msg-bubble.mine { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: var(--mine-bg); color: var(--accent); font-size: 0.8rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .msg-body { max-width: 70%; }
    .msg-author { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 0.2rem; }
    .msg-bubble.mine .msg-author { text-align: right; }
    .msg-text {
      background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.5rem 0.875rem; font-size: 0.875rem; line-height: 1.45;
      word-break: break-word;
    }
    .msg-text p { margin: 0 0 .3em; } .msg-text p:last-child { margin-bottom: 0; }
    .msg-text code { background: #0f1117; padding: .1em .3em; border-radius: 4px; font-size: .85em; }
    .msg-text pre { background: #0f1117; padding: .5rem .75rem; border-radius: 6px; overflow-x: auto; margin: .4em 0; }
    .msg-text pre code { background: none; padding: 0; }
    .msg-text a { color: var(--accent); }
    .msg-text ul, .msg-text ol { padding-left: 1.25em; margin: .25em 0; }
    .msg-text blockquote { border-left: 3px solid var(--border); padding-left: .75rem; color: var(--text-muted); margin: .3em 0; }
    .msg-bubble.mine .msg-text { background: var(--mine-bg); border-color: var(--mine-bdr); color: var(--mine-text); }
    .msg-send {
      display: flex; gap: 0.5rem; padding: 0.75rem;
      border-top: 1px solid var(--border-sub);
    }
    .msg-send textarea { min-height: 44px; max-height: 120px; border-radius: 8px; }

    /* ── Members ── */
    .member-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; background: var(--bg-surf); border: 1px solid var(--border-sub);
      border-radius: 10px;
    }
    .member-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: var(--bb-bg); color: var(--bb-fg); font-size: 1rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .member-name { font-size: 0.9rem; font-weight: 500; }
    .member-cid  { font-size: 0.75rem; color: var(--text-faint); font-family: monospace; }

    /* ── Network create modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 40;
      background: color-mix(in srgb, var(--bg) 80%, transparent); display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; width: 100%; max-width: 400px; }
    .modal h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 1.25rem; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text-faint); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ── Settings panel ── */
    .settings-section { margin-bottom: 1.5rem; }
    .settings-section h4 { font-size: 0.8rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .settings-box { background: var(--bg-surf); border: 1px solid var(--border-sub); border-radius: 10px; padding: 1.25rem; }
    .info-row { display: flex; gap: 0.75rem; margin-bottom: 0.4rem; align-items: baseline; }
    .info-key { font-size: 0.78rem; color: var(--text-dim); flex-shrink: 0; width: 6rem; }
    .info-val { font-size: 0.85rem; font-family: monospace; word-break: break-all; color: var(--accent); }

    /* ── Badge ── */
    .badge { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-weight: 600; }
    .badge-blue { background: var(--bb-bg); color: var(--bb-fg); }
    .badge-red  { background: #7f1d1d33; color: #f87171; }

    /* ── Spinner ── */
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fraud alerts ── */
    .fraud-banner { background: #7f1d1d33; border-bottom: 1px solid #dc262655; padding: 0.75rem 1.5rem; }
    .fraud-banner p { font-size: 0.85rem; color: #f87171; }

    /* ── Global JS error banner ── */
    #js-error-banner { display:none; background:#7f1d1d; border-bottom:2px solid #dc2626; padding:0.6rem 1.5rem; font-size:0.85rem; color:#fca5a5; }
    #js-error-banner button { margin-left:1rem; font-size:0.8rem; color:#fca5a5; text-decoration:underline; cursor:pointer; background:none; border:none; }

    /* ── Sync indicator ── */
    .sync-bar { background: var(--bg-elev); border-bottom: 1px solid var(--border-sub); padding: 0.4rem 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; color: var(--text-dim); }
  </style>
<script>
  // Handler global d'erreurs JS — affiche un bandeau visible plutôt qu'un silence console
  (function() {
    function showBanner(msg) {
      var b = document.getElementById('js-error-banner');
      if (b) { b.querySelector('span').textContent = msg; b.style.display = 'block'; }
    }
    window.addEventListener('error', function(e) {
      showBanner(e.message || 'Erreur JavaScript inattendue');
    });
    window.addEventListener('unhandledrejection', function(e) {
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || 'Erreur asynchrone inattendue');
      showBanner(msg);
    });
  })();
</script>
</head>
<body x-data="civiumApp()" x-init="init()">
<div id="js-error-banner"><span></span><button onclick="this.parentElement.style.display='none'">Fermer</button></div>

  <!-- Overlay identité -->
  <div class="overlay" x-show="phase !== 'ready'" x-cloak>
    <div class="card">

      <!-- Chargement -->
      <template x-if="phase === 'loading'">
        <p style="color:var(--text-dim);text-align:center"><span class="spin">↻</span> Chargement…</p>
      </template>

      <!-- Première connexion : configuration identité -->
      <template x-if="phase === 'setup'">
        <div>

          <!-- Choix de la méthode -->
          <template x-if="!setupMode">
            <div>
              <h2>Bienvenue sur Civium</h2>
              <p>Comment souhaitez-vous configurer votre identité sur cet appareil ?</p>
              <div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:1.25rem">
                <button class="btn btn-primary btn-full" @click="setupMode = 'generate'">
                  Créer une nouvelle identité
                </button>
                <button class="btn btn-ghost btn-full" @click="setupMode = 'import'">
                  Importer depuis l'application bureau
                </button>
              </div>
            </div>
          </template>

          <!-- Générer une nouvelle identité -->
          <template x-if="setupMode === 'generate'">
            <div>
              <h2>Créer votre identité</h2>
              <p>Une clé cryptographique unique sera générée dans ce navigateur et chiffrée par votre code PIN. Elle ne quitte jamais cet appareil.</p>
              <div class="msg msg-err" x-show="setupErr" x-text="setupErr" style="display:none"></div>
              <div class="field">
                <label>Nom d'affichage <small style="color:#475569">(facultatif)</small></label>
                <input type="text" x-model="setupDisplayName" placeholder="Ex : Marie Dupont" autocomplete="name">
              </div>
              <div class="field">
                <label>Code PIN (6 caractères minimum)</label>
                <input type="password" x-model="setupPin" placeholder="••••••" maxlength="32">
              </div>
              <div class="field">
                <label>Confirmer le PIN</label>
                <input type="password" x-model="setupPin2" placeholder="••••••" maxlength="32" @keydown.enter="doGenerate()">
              </div>
              <button class="btn btn-primary btn-full" @click="doGenerate()" :disabled="setupLoading">
                <span x-text="setupLoading ? 'Génération…' : 'Créer mon identité'"></span>
              </button>
              <button class="btn btn-ghost btn-full" style="margin-top:0.5rem" @click="setupMode = null; setupErr = ''">← Retour</button>
            </div>
          </template>

          <!-- Importer depuis l'application bureau -->
          <template x-if="setupMode === 'import'">
            <div>
              <h2>Importer votre clé secrète</h2>
              <p>
                Entrez votre <strong>clé secrète</strong> (affichée dans l'application bureau Civium :
                Identité → "Clé secrète") et votre <strong>CID complet</strong> (ex : civ1abc…), puis
                choisissez un code PIN. La clé ne quitte jamais cet appareil.
              </p>
              <div class="msg msg-err" x-show="setupErr" x-text="setupErr" style="display:none"></div>
              <div class="field">
                <label>Clé secrète (base58, 44 caractères)</label>
                <input type="text" x-model="setupSecret" placeholder="Votre clé secrète…" autocomplete="off" spellcheck="false">
              </div>
              <div class="field">
                <label>CID complet (civ1…)</label>
                <input type="text" x-model="setupCid" placeholder="civ1…" autocomplete="off" spellcheck="false">
              </div>
              <div class="field">
                <label>Code PIN (6 caractères minimum)</label>
                <input type="password" x-model="setupPin" placeholder="••••••" maxlength="32">
              </div>
              <div class="field">
                <label>Confirmer le PIN</label>
                <input type="password" x-model="setupPin2" placeholder="••••••" maxlength="32" @keydown.enter="doSetup()">
              </div>
              <button class="btn btn-primary btn-full" @click="doSetup()" :disabled="setupLoading">
                <span x-text="setupLoading ? 'Chiffrement…' : 'Enregistrer et ouvrir'"></span>
              </button>
              <button class="btn btn-ghost btn-full" style="margin-top:0.5rem" @click="setupMode = null; setupErr = ''">← Retour</button>
            </div>
          </template>

        </div>
      </template>

      <!-- Déverrouillage -->
      <template x-if="phase === 'unlock'">
        <div>
          <h2>Déverrouiller votre identité</h2>
          <p>Entrez votre code PIN pour accéder à vos réseaux Civium.</p>
          <div class="msg msg-err" x-show="unlockErr" x-text="unlockErr" style="display:none"></div>
          <div class="field">
            <label>Code PIN</label>
            <input type="password" x-model="unlockPin" placeholder="••••••" @keydown.enter="doUnlock()" autocomplete="current-password">
          </div>
          <button class="btn btn-primary btn-full" @click="doUnlock()" :disabled="unlockLoading">
            <span x-text="unlockLoading ? 'Déchiffrement…' : 'Déverrouiller'"></span>
          </button>
          <button class="btn btn-ghost btn-full" style="margin-top:0.75rem" @click="resetKey()">Utiliser une autre clé…</button>
        </div>
      </template>
    </div>
  </div>

  <!-- App principale -->
  <div x-show="phase === 'ready'" x-cloak style="display:flex;flex-direction:column;flex:1;overflow:hidden">

    <!-- Alertes fraude -->
    <template x-if="fraudAlerts.length > 0">
      <div class="fraud-banner">
        <template x-for="al in fraudAlerts">
          <p>⚠ [<span x-text="al.type"></span>] <span x-text="al.description"></span></p>
        </template>
      </div>
    </template>

    <div class="app-layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Civium</span>
          <div x-data="{ open: false }" style="position:relative">
            <button class="sidebar-add" title="Réseau" @click="open = !open">+</button>
            <div x-show="open" @click.outside="open = false" x-cloak
                 style="position:absolute;right:0;top:2rem;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:0.25rem;z-index:50;min-width:10rem">
              <button @click="showCreateModal = true; open = false"
                style="display:block;width:100%;text-align:left;background:none;border:none;color:#94a3b8;padding:0.5rem 0.75rem;border-radius:6px;cursor:pointer;font-size:0.82rem;transition:background 0.12s"
                onmouseover="this.style.background='#1e2235'" onmouseout="this.style.background='none'">
                + Créer un réseau
              </button>
              <button @click="showJoinModal = true; joinTab = 'directory'; loadPublicNetworks(); open = false"
                style="display:block;width:100%;text-align:left;background:none;border:none;color:#94a3b8;padding:0.5rem 0.75rem;border-radius:6px;cursor:pointer;font-size:0.82rem;transition:background 0.12s"
                onmouseover="this.style.background='#1e2235'" onmouseout="this.style.background='none'">
                Rejoindre un réseau
              </button>
            </div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <!-- Réseaux — hiérarchie parent → sous-réseaux -->
          <template x-for="net in networks.filter(n => !n.parent_network_cid)" :key="net.network_cid">
            <div>
              <!-- Réseau parent -->
              <button
                class="net-item" :class="{ active: selectedNet?.network_cid === net.network_cid }"
                @click="selectNetwork(net)"
              >
                <div class="net-name">
                  <span x-text="net.network_name"></span>
                  <template x-if="net.is_joined"><span class="badge badge-blue" style="font-size:.65rem">✓</span></template>
                </div>
                <div class="net-sub" x-text="net.network_cid.substring(0,16) + '…'"></div>
              </button>
              <!-- Sous-navigation si réseau sélectionné -->
              <template x-if="selectedNet?.network_cid === net.network_cid">
                <div x-data="{}">
                  <button class="view-item" :class="{ active: view === 'messages' }" @click="view = 'messages'">💬 Messages</button>
                  <button class="view-item" :class="{ active: view === 'membres' }" @click="view = 'membres'">👥 Membres</button>
                  <button class="view-item" :class="{ active: view === 'gouvernance' }" @click="view = 'gouvernance'; loadProposals()">🗳 Gouvernance</button>
                  <button class="view-item" :class="{ active: view === 'agenda' }" @click="view = 'agenda'; loadAgenda()">📅 Agenda</button>
                  <button class="view-item" :class="{ active: view === 'documents' }" @click="view = 'documents'; loadDocuments()">📄 Documents</button>
                  <button class="view-item" :class="{ active: view === 'annuaire' }" @click="view = 'annuaire'; loadDirectory()">🔎 Annuaire</button>
                  <button class="view-item" :class="{ active: view === 'dms' }" @click="view = 'dms'; loadConversations()">✉ Messages directs</button>
                  <button class="view-item" :class="{ active: view === 'notifications' }" @click="view = 'notifications'; loadNotifications()">
                    🔔 Notifications
                    <template x-if="unreadNotifs > 0"><span style="margin-left:.3rem;background:#dc2626;color:#fff;font-size:.65rem;padding:1px 5px;border-radius:10px" x-text="unreadNotifs"></span></template>
                  </button>
                  <button class="view-item" :class="{ active: view === 'activite' }" @click="view = 'activite'">📊 Activité</button>
                  <template x-if="isJoined">
                    <button class="view-item" style="color:#f87171" @click="leaveNetwork()">🚪 Quitter ce réseau</button>
                  </template>
                </div>
              </template>
              <!-- Sous-réseaux indentés -->
              <template x-for="child in networks.filter(n => n.parent_network_cid === net.network_cid)" :key="child.network_cid">
                <div style="padding-left:.75rem;border-left:2px solid #2d3148;margin-left:.75rem">
                  <button
                    class="net-item" :class="{ active: selectedNet?.network_cid === child.network_cid }"
                    @click="selectNetwork(child)"
                    style="font-size:.82rem"
                  >
                    <div class="net-name">
                      <span style="color:#64748b;margin-right:.2rem">↳</span>
                      <span x-text="child.network_name"></span>
                      <template x-if="child.is_joined"><span class="badge badge-blue" style="font-size:.6rem">✓</span></template>
                    </div>
                    <div class="net-sub" x-text="child.network_cid.substring(0,16) + '…'"></div>
                  </button>
                  <template x-if="selectedNet?.network_cid === child.network_cid">
                    <div x-data="{}">
                      <button class="view-item" :class="{ active: view === 'messages' }" @click="view = 'messages'">💬 Messages</button>
                      <button class="view-item" :class="{ active: view === 'membres' }" @click="view = 'membres'">👥 Membres</button>
                      <button class="view-item" :class="{ active: view === 'gouvernance' }" @click="view = 'gouvernance'; loadProposals()">🗳 Gouvernance</button>
                      <button class="view-item" :class="{ active: view === 'agenda' }" @click="view = 'agenda'; loadAgenda()">📅 Agenda</button>
                      <button class="view-item" :class="{ active: view === 'documents' }" @click="view = 'documents'; loadDocuments()">📄 Documents</button>
                      <button class="view-item" :class="{ active: view === 'annuaire' }" @click="view = 'annuaire'; loadDirectory()">🔎 Annuaire</button>
                      <button class="view-item" :class="{ active: view === 'dms' }" @click="view = 'dms'; loadConversations()">✉ Messages directs</button>
                      <button class="view-item" :class="{ active: view === 'notifications' }" @click="view = 'notifications'; loadNotifications()">
                        🔔 Notifications
                        <template x-if="unreadNotifs > 0"><span style="margin-left:.3rem;background:#dc2626;color:#fff;font-size:.65rem;padding:1px 5px;border-radius:10px" x-text="unreadNotifs"></span></template>
                      </button>
                      <button class="view-item" :class="{ active: view === 'activite' }" @click="view = 'activite'">📊 Activité</button>
                      <template x-if="isJoined">
                        <button class="view-item" style="color:#f87171" @click="leaveNetwork()">🚪 Quitter ce réseau</button>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <template x-if="networks.length === 0">
            <p style="font-size:.8rem;color:#475569;padding:.5rem .625rem">Aucun réseau. Cliquez + pour en rejoindre un.</p>
          </template>
        </nav>

        <div class="sidebar-footer">
          <div style="display:flex;align-items:center;gap:.5rem">
            <span class="status-dot" :class="{ online: hubConnected }"></span>
            <span style="font-size:.75rem;color:#64748b" x-text="hubConnected ? 'Connecté au hub' : 'Hors ligne'"></span>
          </div>
          <button class="btn-settings" @click="view = 'parametres'">⚙ Paramètres</button>
        </div>
      </aside>

      <!-- Contenu principal -->
      <main class="main">

        <!-- Barre de sync -->
        <div class="sync-bar" x-show="syncing">
          <span class="spin">↻</span> Synchronisation…
        </div>

        <!-- Vue : sélectionner un réseau -->
        <template x-if="!selectedNet && view !== 'parametres'">
          <div class="panel">
            <div class="empty">
              <div class="empty-icon">🌐</div>
              <div>Sélectionnez un réseau dans la barre latérale ou rejoignez-en un nouveau.</div>
            </div>
          </div>
        </template>

        <!-- Vue : messages -->
        <template x-if="selectedNet && view === 'messages'">
          <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
              <div>
                <h2 class="panel-title" x-text="selectedNet.network_name"></h2>
                <p style="font-size:.78rem;color:#64748b;font-family:monospace" x-text="selectedNet.network_cid"></p>
              </div>
              <button class="btn btn-ghost btn-sm" @click="syncNetwork()" :disabled="syncing">
                <span :class="{ spin: syncing }">↻</span> Sync
              </button>
            </div>

            <template x-if="!isJoined">
              <div class="msg msg-info">
                Vous n'êtes pas encore membre de ce réseau.
                <button class="btn btn-primary btn-sm" style="margin-top:.5rem" @click="joinNetwork()" :disabled="joining">
                  <span x-text="joining ? 'Rejoindre…' : 'Rejoindre ce réseau'"></span>
                </button>
              </div>
            </template>

            <div class="msg-thread">
              <div class="msg-list" x-ref="msgList">
                <template x-if="messages.length === 0">
                  <div class="empty" style="padding:2rem">
                    <div class="empty-icon">💬</div>
                    <div>Aucun message. Soyez le premier à écrire !</div>
                  </div>
                </template>
                <template x-for="msg in messages" :key="msg.id || msg.message_id">
                  <div class="msg-bubble" :class="{ mine: isMine(msg) }">
                    <div class="msg-avatar" x-text="(msg.sender_name || msg.sender_cid || '?')[0].toUpperCase()"></div>
                    <div class="msg-body">
                      <div class="msg-author" x-text="msg.sender_name || msg.sender_cid || 'Inconnu'"></div>
                      <div class="msg-text" x-html="renderMarkdown(msg.body || msg.content || '')"></div>
                    </div>
                  </div>
                </template>
                <div x-ref="msgBottom"></div>
              </div>
              <template x-if="isJoined">
                <div class="msg-send">
                  <textarea
                    x-model="msgText"
                    placeholder="Écrivez un message… (Entrée pour envoyer)"
                    @keydown.enter.exact.prevent="sendMessage()"
                    rows="1"
                    style="flex:1"
                  ></textarea>
                  <button class="btn btn-primary btn-sm" @click="sendMessage()" :disabled="sending || !msgText.trim()">
                    <span x-text="sending ? '…' : 'Envoyer'"></span>
                  </button>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : membres -->
        <template x-if="selectedNet && view === 'membres'">
          <div class="panel">
            <h2 class="panel-title" x-text="selectedNet.network_name + ' — Membres'"></h2>
            <p class="panel-sub">Membres enregistrés sur le hub.</p>
            <div style="display:flex;flex-direction:column;gap:.75rem">
              <template x-if="members.length === 0">
                <div class="empty"><div class="empty-icon">👥</div><div>Aucun membre enregistré sur ce hub.</div></div>
              </template>
              <template x-for="m in members" :key="m.member_cid">
                <div class="member-item">
                  <div class="member-avatar" x-text="(m.display_name || m.member_cid || '?')[0].toUpperCase()"></div>
                  <div style="flex:1">
                    <div style="display:flex;align-items:center;gap:.4rem">
                      <div class="member-name" x-text="m.display_name || 'Sans nom'"></div>
                      <template x-if="m.member_cid === identity?.cid_full">
                        <span style="font-size:.65rem;background:#312e81;color:#a5b4fc;padding:1px 6px;border-radius:10px">Moi</span>
                      </template>
                      <template x-if="typeof m.circle === 'number'">
                        <span style="font-size:.65rem;background:#1e2235;color:#64748b;padding:1px 6px;border-radius:10px" x-text="'Cercle ' + m.circle"></span>
                      </template>
                    </div>
                    <div class="member-cid" x-text="m.member_cid"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : gouvernance -->
        <template x-if="selectedNet && view === 'gouvernance'">
          <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
              <div>
                <h2 class="panel-title" x-text="selectedNet.network_name + ' — Gouvernance'"></h2>
                <p class="panel-sub">Propositions et votes du réseau.</p>
              </div>
              <template x-if="isJoined">
                <button class="btn btn-primary btn-sm" @click="showCreateProposal = !showCreateProposal">
                  + Nouvelle proposition
                </button>
              </template>
            </div>

            <!-- Formulaire nouvelle proposition -->
            <template x-if="showCreateProposal && isJoined">
              <div style="background:#111827;border:1px solid #4f46e5;border-radius:10px;padding:1rem;margin-bottom:1.25rem">
                <h4 style="margin:0 0 .75rem">Nouvelle proposition</h4>
                <div class="field" style="margin-bottom:.5rem">
                  <label>Titre</label>
                  <input type="text" x-model="newProposalTitle" placeholder="Sujet de la proposition…">
                </div>
                <div class="field" style="margin-bottom:.75rem">
                  <label>Description <small style="color:#475569">(facultatif)</small></label>
                  <textarea x-model="newProposalDesc" rows="3" placeholder="Détails, arguments, contexte…"></textarea>
                </div>
                <div style="display:flex;gap:.5rem">
                  <button class="btn btn-primary btn-sm" @click="createProposal()" :disabled="creatingProposal || !newProposalTitle.trim()">
                    <span x-text="creatingProposal ? 'Envoi…' : 'Soumettre'"></span>
                  </button>
                  <button class="btn btn-ghost btn-sm" @click="showCreateProposal = false">Annuler</button>
                </div>
              </div>
            </template>

            <!-- Liste des propositions -->
            <template x-if="loadingProposals">
              <p style="text-align:center;color:#64748b;padding:2rem;font-size:.85rem">Chargement…</p>
            </template>
            <template x-if="!loadingProposals && proposals.length === 0">
              <div class="empty"><div class="empty-icon">🗳</div><div>Aucune proposition pour l'instant.</div></div>
            </template>
            <div style="display:flex;flex-direction:column;gap:1rem">
              <template x-for="p in proposals" :key="p.id">
                <div style="background:#111827;border:1px solid #1e2235;border-radius:10px;padding:1rem">
                  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
                    <div style="flex:1">
                      <div style="font-weight:600;margin-bottom:.25rem" x-text="p.title"></div>
                      <div style="font-size:.78rem;color:#64748b;margin-bottom:.5rem" x-text="'Par ' + (p.author_cid || '').substring(0,16) + '… · ' + (p.created_at || '').substring(0,10)"></div>
                      <template x-if="p.description">
                        <div style="font-size:.85rem;color:#94a3b8;margin-bottom:.75rem;white-space:pre-wrap" x-text="p.description"></div>
                      </template>
                    </div>
                    <span style="font-size:.7rem;padding:2px 8px;border-radius:20px;white-space:nowrap"
                      :style="p.status === 'open' ? 'background:#16a34a22;color:#22c55e;border:1px solid #22c55e44' : 'background:#33334422;color:#64748b;border:1px solid #2d3148'"
                      x-text="p.status === 'open' ? 'Ouverte' : 'Fermée'">
                    </span>
                  </div>
                  <!-- Résultats -->
                  <div style="display:flex;gap:.5rem;font-size:.78rem;margin-bottom:.75rem">
                    <span style="color:#22c55e">✓ Oui : <strong x-text="p.yes_count || 0"></strong></span>
                    <span style="color:#ef4444">✗ Non : <strong x-text="p.no_count || 0"></strong></span>
                    <span style="color:#94a3b8">— Abstention : <strong x-text="p.abstain_count || 0"></strong></span>
                    <span style="color:#475569">· Total : <strong x-text="p.vote_count || 0"></strong></span>
                  </div>
                  <!-- Boutons vote -->
                  <template x-if="isJoined && p.status === 'open'">
                    <div style="display:flex;gap:.5rem">
                      <button class="btn btn-sm"
                        @click="castVote(p.id, 'yes')"
                        :disabled="votingProposal === p.id"
                        :style="p.my_vote === 'yes' ? 'background:#16a34a;color:#fff;border-color:#16a34a' : 'background:none;color:#22c55e;border:1px solid #22c55e55'"
                        style="border-radius:6px;padding:.3rem .75rem;cursor:pointer;font-size:.8rem">
                        ✓ Oui
                      </button>
                      <button class="btn btn-sm"
                        @click="castVote(p.id, 'no')"
                        :disabled="votingProposal === p.id"
                        :style="p.my_vote === 'no' ? 'background:#dc2626;color:#fff;border-color:#dc2626' : 'background:none;color:#ef4444;border:1px solid #ef444455'"
                        style="border-radius:6px;padding:.3rem .75rem;cursor:pointer;font-size:.8rem">
                        ✗ Non
                      </button>
                      <button class="btn btn-sm"
                        @click="castVote(p.id, 'abstain')"
                        :disabled="votingProposal === p.id"
                        :style="p.my_vote === 'abstain' ? 'background:#475569;color:#fff;border-color:#475569' : 'background:none;color:#64748b;border:1px solid #2d3148'"
                        style="border-radius:6px;padding:.3rem .75rem;cursor:pointer;font-size:.8rem">
                        — Abstention
                      </button>
                    </div>
                  </template>
                  <template x-if="isJoined && p.status === 'open' && p.my_vote">
                    <p style="font-size:.72rem;color:#64748b;margin-top:.4rem" x-text="'Votre vote : ' + (p.my_vote === 'yes' ? 'Oui' : p.my_vote === 'no' ? 'Non' : 'Abstention') + ' (modifiable)'"></p>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : agenda -->
        <template x-if="selectedNet && view === 'agenda'">
          <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
              <div>
                <h2 class="panel-title" x-text="selectedNet.network_name + ' — Agenda'"></h2>
                <p class="panel-sub">Événements à venir du réseau.</p>
              </div>
              <template x-if="isJoined">
                <button class="btn btn-primary btn-sm" @click="showCreateEvent = !showCreateEvent">
                  + Nouvel événement
                </button>
              </template>
            </div>

            <!-- Formulaire nouvel événement -->
            <template x-if="showCreateEvent && isJoined">
              <div style="background:#111827;border:1px solid #4f46e5;border-radius:10px;padding:1rem;margin-bottom:1.25rem">
                <h4 style="margin:0 0 .75rem">Nouvel événement</h4>
                <div class="field" style="margin-bottom:.5rem">
                  <label>Titre</label>
                  <input type="text" x-model="newEventTitle" placeholder="Nom de l'événement…">
                </div>
                <div class="field" style="margin-bottom:.5rem">
                  <label>Description <small style="color:#475569">(facultatif)</small></label>
                  <textarea x-model="newEventDesc" rows="2" placeholder="Lieu, ordre du jour, lien…"></textarea>
                </div>
                <div style="display:flex;gap:.5rem;margin-bottom:.75rem">
                  <div class="field" style="flex:1;margin:0">
                    <label>Début</label>
                    <input type="datetime-local" x-model="newEventStart">
                  </div>
                  <div class="field" style="flex:1;margin:0">
                    <label>Fin <small style="color:#475569">(facultatif)</small></label>
                    <input type="datetime-local" x-model="newEventEnd">
                  </div>
                </div>
                <div style="display:flex;gap:.5rem">
                  <button class="btn btn-primary btn-sm" @click="createEvent()" :disabled="creatingEvent || !newEventTitle.trim() || !newEventStart">
                    <span x-text="creatingEvent ? 'Enregistrement…' : 'Créer l\'événement'"></span>
                  </button>
                  <button class="btn btn-ghost btn-sm" @click="showCreateEvent = false">Annuler</button>
                </div>
              </div>
            </template>

            <!-- Formulaire édition événement -->
            <template x-if="editingEvent">
              <div style="background:#111827;border:1px solid #4f46e5;border-radius:10px;padding:1rem;margin-bottom:1.25rem">
                <h4 style="margin:0 0 .75rem">Modifier l'événement</h4>
                <div class="field" style="margin-bottom:.5rem">
                  <label>Titre</label>
                  <input type="text" x-model="editEventTitle" placeholder="Titre de l'événement…">
                </div>
                <div class="field" style="margin-bottom:.5rem">
                  <label>Description <small style="color:#475569">(facultatif)</small></label>
                  <textarea x-model="editEventDesc" rows="2" placeholder="Description…"></textarea>
                </div>
                <div style="display:flex;gap:.5rem;margin-bottom:.75rem">
                  <div class="field" style="flex:1;margin-bottom:0">
                    <label>Début</label>
                    <input type="datetime-local" x-model="editEventStart">
                  </div>
                  <div class="field" style="flex:1;margin-bottom:0">
                    <label>Fin <small style="color:#475569">(facultatif)</small></label>
                    <input type="datetime-local" x-model="editEventEnd">
                  </div>
                </div>
                <div style="display:flex;gap:.5rem">
                  <button class="btn btn-primary btn-sm" @click="updateEvent()" :disabled="updatingEvent || !editEventTitle.trim() || !editEventStart">
                    <span x-text="updatingEvent ? 'Enregistrement…' : 'Mettre à jour'"></span>
                  </button>
                  <button class="btn btn-ghost btn-sm" @click="editingEvent = null">Annuler</button>
                </div>
              </div>
            </template>

            <!-- Liste des événements -->
            <template x-if="loadingAgenda">
              <p style="text-align:center;color:#64748b;padding:2rem;font-size:.85rem">Chargement…</p>
            </template>
            <template x-if="!loadingAgenda && agendaEvents.length === 0">
              <div class="empty"><div class="empty-icon">📅</div><div>Aucun événement planifié.</div></div>
            </template>
            <div style="display:flex;flex-direction:column;gap:.75rem">
              <template x-for="ev in agendaEvents" :key="ev.id">
                <div style="background:#111827;border:1px solid #1e2235;border-radius:10px;padding:1rem;display:flex;gap:1rem">
                  <!-- Bloc date -->
                  <div style="min-width:52px;text-align:center;background:#0f1220;border:1px solid #2d3148;border-radius:8px;padding:.4rem .3rem">
                    <div style="font-size:.65rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em" x-text="new Date(ev.start_at).toLocaleDateString('fr-FR',{month:'short'})"></div>
                    <div style="font-size:1.5rem;font-weight:700;line-height:1;color:#e2e8f0" x-text="new Date(ev.start_at).getDate()"></div>
                    <div style="font-size:.65rem;color:#64748b" x-text="new Date(ev.start_at).getFullYear()"></div>
                  </div>
                  <!-- Détails -->
                  <div style="flex:1">
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
                      <div style="font-weight:600;margin-bottom:.2rem" x-text="ev.title"></div>
                      <template x-if="isJoined && ev.author_cid === identity?.cid_full">
                        <div style="display:flex;gap:.35rem;flex-shrink:0">
                          <button class="btn btn-ghost btn-sm" @click="startEditEvent(ev)">Modifier</button>
                          <button class="btn btn-sm" style="background:none;border:1px solid #dc262655;color:#f87171;padding:.3rem .6rem;border-radius:6px;cursor:pointer;font-size:.78rem" @click="deleteEvent(ev.id)" :disabled="deletingEvent === ev.id">Supprimer</button>
                        </div>
                      </template>
                    </div>
                    <div style="font-size:.78rem;color:#64748b;margin-bottom:.35rem">
                      <span x-text="new Date(ev.start_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})"></span>
                      <template x-if="ev.end_at">
                        <span x-text="' → ' + new Date(ev.end_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})"></span>
                      </template>
                      <span style="color:#475569"> · par <span x-text="(ev.author_cid || '').substring(0,16) + '…'"></span></span>
                    </div>
                    <template x-if="ev.description">
                      <div style="font-size:.82rem;color:#94a3b8;white-space:pre-wrap" x-text="ev.description"></div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : activité -->
        <template x-if="selectedNet && view === 'activite'">
          <div class="panel">
            <h2 class="panel-title" x-text="selectedNet.network_name + ' — Activité'"></h2>
            <p class="panel-sub">Derniers messages synchronisés.</p>
            <div style="display:flex;flex-direction:column;gap:.5rem">
              <template x-if="messages.length === 0">
                <div class="empty"><div class="empty-icon">📊</div><div>Aucune activité.</div></div>
              </template>
              <template x-for="msg in messages.slice().reverse().slice(0,20)" :key="msg.id || msg.message_id">
                <div style="background:#111827;border:1px solid #1e2235;border-radius:10px;padding:.75rem 1rem">
                  <div style="font-size:.78rem;color:#64748b;margin-bottom:.25rem" x-text="msg.sender_name || msg.sender_cid"></div>
                  <div style="font-size:.875rem" x-text="msg.body || msg.content"></div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : documents -->
        <template x-if="selectedNet && view === 'documents'">
          <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
              <div>
                <h2 class="panel-title" x-text="selectedNet.network_name + ' — Documents'"></h2>
                <p class="panel-sub">Documents collaboratifs du réseau.</p>
              </div>
              <template x-if="isJoined">
                <button class="btn btn-primary btn-sm" @click="showCreateDoc = !showCreateDoc">
                  + Nouveau document
                </button>
              </template>
            </div>

            <!-- Formulaire nouveau document -->
            <template x-if="showCreateDoc && isJoined">
              <div style="background:#111827;border:1px solid #4f46e5;border-radius:10px;padding:1rem;margin-bottom:1.25rem">
                <h4 style="margin:0 0 .75rem" x-text="editingDoc ? 'Modifier le document' : 'Nouveau document'"></h4>
                <div class="field" style="margin-bottom:.5rem">
                  <label>Titre</label>
                  <input type="text" x-model="newDocTitle" placeholder="Titre du document…">
                </div>
                <div class="field" style="margin-bottom:.75rem">
                  <label>Contenu</label>
                  <textarea x-model="newDocContent" rows="8" placeholder="Contenu du document…" style="font-family:monospace;font-size:.85rem"></textarea>
                </div>
                <div style="display:flex;gap:.5rem">
                  <button class="btn btn-primary btn-sm" @click="saveDocument()" :disabled="savingDoc || !newDocTitle.trim()">
                    <span x-text="savingDoc ? 'Enregistrement…' : (editingDoc ? 'Mettre à jour' : 'Créer')"></span>
                  </button>
                  <button class="btn btn-ghost btn-sm" @click="cancelDocEdit()">Annuler</button>
                </div>
              </div>
            </template>

            <!-- Liste des documents -->
            <template x-if="loadingDocs">
              <p style="text-align:center;color:#64748b;padding:2rem;font-size:.85rem">Chargement…</p>
            </template>
            <template x-if="!loadingDocs && documents.length === 0">
              <div class="empty"><div class="empty-icon">📄</div><div>Aucun document. Créez le premier !</div></div>
            </template>
            <div style="display:flex;flex-direction:column;gap:.75rem">
              <template x-for="doc in documents" :key="doc.id">
                <div style="background:#111827;border:1px solid #1e2235;border-radius:10px;padding:1rem">
                  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem">
                    <div style="flex:1">
                      <div style="font-weight:600;margin-bottom:.25rem" x-text="doc.title"></div>
                      <div style="font-size:.75rem;color:#64748b" x-text="'Modifié par ' + (doc.last_edited_by || '').substring(0,16) + '… · ' + (doc.updated_at || '').substring(0,10)"></div>
                      <template x-if="doc.content">
                        <div style="font-size:.82rem;color:#94a3b8;margin-top:.5rem;white-space:pre-wrap;max-height:80px;overflow:hidden" x-text="doc.content.substring(0, 200) + (doc.content.length > 200 ? '…' : '')"></div>
                      </template>
                    </div>
                    <template x-if="isJoined">
                      <div style="display:flex;gap:.35rem">
                        <button class="btn btn-ghost btn-sm" @click="editDocument(doc)">Modifier</button>
                        <template x-if="doc.author_cid === identity?.cid_full">
                          <button class="btn btn-sm" style="background:none;border:1px solid #dc262655;color:#f87171;padding:.3rem .6rem;border-radius:6px;cursor:pointer;font-size:.78rem" @click="deleteDocument(doc.id)" :disabled="deletingDoc === doc.id">Supprimer</button>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : annuaire -->
        <template x-if="selectedNet && view === 'annuaire'">
          <div class="panel">
            <h2 class="panel-title" x-text="selectedNet.network_name + ' — Annuaire'"></h2>
            <p class="panel-sub">Recherchez des membres de ce réseau.</p>
            <div style="display:flex;gap:.5rem;margin-bottom:1rem">
              <input type="text" x-model="directoryQuery" placeholder="Rechercher par nom ou CID…"
                @input.debounce.400ms="loadDirectory()"
                style="flex:1">
              <button class="btn btn-primary btn-sm" @click="loadDirectory()">Rechercher</button>
            </div>
            <template x-if="loadingDirectory">
              <p style="text-align:center;color:#64748b;padding:2rem;font-size:.85rem">Chargement…</p>
            </template>
            <template x-if="!loadingDirectory && directoryMembers.length === 0">
              <div class="empty"><div class="empty-icon">🔎</div><div>Aucun résultat.</div></div>
            </template>
            <div style="display:flex;flex-direction:column;gap:.75rem">
              <template x-for="m in directoryMembers" :key="m.member_cid">
                <div class="member-item" style="justify-content:space-between">
                  <div style="display:flex;align-items:center;gap:.75rem">
                    <div class="member-avatar" x-text="(m.display_name || m.member_cid || '?')[0].toUpperCase()"></div>
                    <div>
                      <div class="member-name" x-text="m.display_name || 'Sans nom'"></div>
                      <div class="member-cid" x-text="m.member_cid"></div>
                    </div>
                  </div>
                  <template x-if="m.member_cid !== identity?.cid_full">
                    <button class="btn btn-ghost btn-sm" @click="openDmWith(m)">✉ Message</button>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : messages directs -->
        <template x-if="selectedNet && view === 'dms'">
          <div class="panel">
            <h2 class="panel-title" x-text="selectedNet.network_name + ' — Messages directs'"></h2>
            <p class="panel-sub">Conversations privées avec les membres de ce réseau.</p>

            <!-- Sélecteur de conversation ou thread ouvert -->
            <template x-if="!activeDmPeer">
              <div>
                <template x-if="loadingConversations">
                  <p style="text-align:center;color:#64748b;padding:2rem;font-size:.85rem">Chargement…</p>
                </template>
                <template x-if="!loadingConversations && conversations.length === 0">
                  <div class="empty"><div class="empty-icon">✉</div><div>Aucune conversation. Cherchez un membre dans l'Annuaire pour démarrer.</div></div>
                </template>
                <div style="display:flex;flex-direction:column;gap:.5rem">
                  <template x-for="conv in conversations" :key="conv.other_cid">
                    <button @click="openDmConv(conv)"
                      style="text-align:left;background:#111827;border:1px solid #1e2235;border-radius:10px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s"
                      onmouseover="this.style.borderColor='#4f46e5'" onmouseout="this.style.borderColor='#1e2235'">
                      <div style="display:flex;align-items:center;gap:.75rem">
                        <div class="member-avatar" style="width:36px;height:36px" x-text="(conv.other_name || '?')[0].toUpperCase()"></div>
                        <div style="flex:1;overflow:hidden">
                          <div style="font-weight:600;font-size:.9rem" x-text="conv.other_name"></div>
                          <div style="font-size:.78rem;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" x-text="conv.last_body"></div>
                        </div>
                        <div style="font-size:.7rem;color:#475569;flex-shrink:0" x-text="(conv.last_at || '').substring(0,10)"></div>
                      </div>
                    </button>
                  </template>
                </div>
              </div>
            </template>

            <!-- Thread DM ouvert -->
            <template x-if="activeDmPeer">
              <div>
                <button class="btn btn-ghost btn-sm" style="margin-bottom:1rem" @click="activeDmPeer = null; activeDmThread = []">← Retour</button>
                <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1rem">
                  <div class="member-avatar" x-text="(activeDmPeer.other_name || '?')[0].toUpperCase()"></div>
                  <span style="font-weight:600" x-text="activeDmPeer.other_name || activeDmPeer.other_cid"></span>
                </div>
                <div class="msg-thread">
                  <div class="msg-list" x-ref="dmList">
                    <template x-if="activeDmThread.length === 0">
                      <div class="empty" style="padding:2rem"><div class="empty-icon">✉</div><div>Démarrez la conversation.</div></div>
                    </template>
                    <template x-for="dm in activeDmThread" :key="dm.id">
                      <div class="msg-bubble" :class="{ mine: dm.sender_cid === identity?.cid_full }">

                        <div class="msg-body">
                          <div class="msg-author" x-text="dm.sender_name || dm.sender_cid"></div>

                        </div>
                      </div>
                    </template>
                    <div x-ref="dmBottom"></div>
                  </div>
                  <template x-if="isJoined">
                    <div class="msg-send">
                      <textarea x-model="dmText" placeholder="Message privé… (Entrée pour envoyer)"
                        @keydown.enter.exact.prevent="sendDm()"
                        rows="1" style="flex:1"></textarea>
                      <button class="btn btn-primary btn-sm" @click="sendDm()" :disabled="sendingDm || !dmText.trim()">
                        <span x-text="sendingDm ? '…' : 'Envoyer'"></span>
                      </button>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Vue : notifications -->
        <template x-if="selectedNet && view === 'notifications'">
          <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
              <div>
                <h2 class="panel-title" x-text="selectedNet.network_name + ' — Notifications'"></h2>
                <p class="panel-sub">Activité récente du réseau vous concernant.</p>
              </div>
              <template x-if="notifications.length > 0">
                <button class="btn btn-ghost btn-sm" @click="markAllRead()">Tout marquer comme lu</button>
              </template>
            </div>
            <template x-if="loadingNotifs">
              <p style="text-align:center;color:#64748b;padding:2rem;font-size:.85rem">Chargement…</p>
            </template>
            <template x-if="!loadingNotifs && notifications.length === 0">
              <div class="empty"><div class="empty-icon">🔔</div><div>Aucune notification.</div></div>
            </template>
            <div style="display:flex;flex-direction:column;gap:.5rem">
              <template x-for="n in notifications" :key="n.id">
                <div style="background:#111827;border-radius:10px;padding:.75rem 1rem;display:flex;gap:.75rem;align-items:flex-start"
                  :style="!n.is_read ? 'border:1px solid #4f46e555' : 'border:1px solid #1e2235'">
                  <span style="font-size:1.1rem;flex-shrink:0"
                    x-text="n.type === 'message' ? '💬' : n.type === 'dm' ? '✉' : n.type === 'document' ? '📄' : n.type === 'member_joined' ? '👤' : '🔔'"></span>
                  <div style="flex:1">
                    <div style="font-size:.875rem;font-weight:500" x-text="n.title"></div>
                    <template x-if="n.body">
                      <div style="font-size:.78rem;color:#64748b;margin-top:.15rem;white-space:pre-wrap" x-text="n.body.substring(0,120)"></div>
                    </template>
                    <div style="font-size:.7rem;color:#475569;margin-top:.25rem" x-text="(n.created_at || '').substring(0,16).replace('T',' ')"></div>
                  </div>
                  <template x-if="!parseInt(n.is_read)">
                    <span style="width:8px;height:8px;border-radius:50%;background:#6366f1;flex-shrink:0;margin-top:.3rem"></span>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Vue : paramètres -->
        <template x-if="view === 'parametres'">
          <div class="panel">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
              <h2 class="panel-title">Paramètres</h2>
              <button class="btn btn-ghost btn-sm" @click="view = 'messages'">✕ Fermer</button>
            </div>

            <!-- Identité -->
            <div class="settings-section">
              <h4>Mon identité Civium</h4>
              <div class="settings-box">
                <div class="info-row"><span class="info-key">Nom</span><span class="info-val" x-text="identity.display_name || identity.cid_short"></span></div>
                <div class="info-row"><span class="info-key">CID court</span><span class="info-val" x-text="identity.cid_short"></span></div>
                <div class="info-row"><span class="info-key">CID complet</span><span class="info-val" x-text="identity.cid_full"></span></div>
                <div class="info-row"><span class="info-key">Clé publique</span><span class="info-val" x-text="identity.pub_key_b58"></span></div>
                <p style="font-size:.78rem;color:#64748b;margin-top:.75rem">
                  Votre clé privée est stockée chiffrée dans ce navigateur (IndexedDB). Elle ne quitte jamais cet appareil.
                </p>
                <div style="display:flex;gap:.5rem;margin-top:.75rem">
                  <button class="btn btn-ghost btn-sm" @click="exportData()">Télécharger mes données (.json)</button>
                  <button class="btn btn-ghost btn-sm" @click="resetKey()">Supprimer la clé de cet appareil</button>
                </div>
              </div>
            </div>

            <!-- Hub -->
            <div class="settings-section">
              <h4>Connexion au hub</h4>
              <div class="settings-box">
                <p style="font-size:.82rem;color:#64748b;margin-bottom:.75rem">
                  Le hub est un serveur PHP qui permet d'accéder à vos réseaux sans nœud desktop.
                </p>
                <div style="display:flex;gap:.5rem">
                  <input type="url" x-model="hubUrl" placeholder="https://www.rouaix.com/civium" style="flex:1">
                  <button class="btn btn-primary btn-sm" @click="loadNetworks()">Connecter</button>
                </div>
                <div class="info-row" style="margin-top:.75rem">
                  <span class="info-key">Statut</span>
                  <span class="info-val" x-text="hubConnected ? 'Connecté ✓' : 'Non connecté'"></span>
                </div>
              </div>
            </div>

            <!-- Déconnexion -->
            <div class="settings-section">
              <h4>Session</h4>
              <div class="settings-box">
                <p style="font-size:.82rem;color:#64748b;margin-bottom:.75rem">
                  Connecté en tant que <strong>{{ @user_email }}</strong>.
                </p>
                <a href="{{ @BASE }}/auth/deconnexion" class="btn btn-ghost btn-sm" style="display:inline-block;text-decoration:none">
                  Se déconnecter
                </a>
              </div>
            </div>
          </div>
        </template>

      </main>
    </div>
  </div>

  <!-- Modal : créer un réseau -->
  <div class="modal-overlay" x-show="showCreateModal" x-cloak @click.self="showCreateModal = false">
    <div class="modal">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
        <h3>Créer un réseau</h3>
        <button class="btn btn-ghost btn-sm" @click="showCreateModal = false">✕</button>
      </div>
      <div class="msg msg-err" x-show="createErr" x-text="createErr" style="display:none"></div>
      <div class="field">
        <label>Nom du réseau</label>
        <input type="text" x-model="newNetworkName" placeholder="Ex : Famille Martin, Équipe projet…">
      </div>
      <div class="field">
        <label>Description <small style="color:#475569">(facultatif)</small></label>
        <textarea x-model="newNetworkDesc" rows="2" placeholder="À quoi sert ce réseau ?"></textarea>
      </div>
      <div class="field">
        <label>Visibilité</label>
        <div style="display:flex;gap:0.5rem;margin-top:0.25rem">
          <button type="button"
            @click="newNetworkPublic = false"
            :style="!newNetworkPublic ? 'background:#4f46e5;color:#fff;border-color:#4f46e5' : 'background:none;color:#94a3b8;border-color:#2d3148'"
            style="flex:1;padding:0.5rem;border:1px solid;border-radius:8px;cursor:pointer;font-size:0.82rem;transition:all 0.15s">
            🔒 Privé
          </button>
          <button type="button"
            @click="newNetworkPublic = true"
            :style="newNetworkPublic ? 'background:#16a34a;color:#fff;border-color:#16a34a' : 'background:none;color:#94a3b8;border-color:#2d3148'"
            style="flex:1;padding:0.5rem;border:1px solid;border-radius:8px;cursor:pointer;font-size:0.82rem;transition:all 0.15s">
            🌐 Public
          </button>
        </div>
        <p style="font-size:0.75rem;color:#475569;margin-top:0.25rem" x-text="newNetworkPublic ? 'Votre réseau sera visible dans les annuaires Civium.' : 'Sur invitation uniquement — invisible dans les annuaires.'"></p>
      </div>
      <template x-if="networks.length > 0">
        <div class="field">
          <label>Sous-réseau de <small style="color:#475569">(facultatif)</small></label>
          <select x-model="newNetworkParent" style="width:100%;background:#0f1220;border:1px solid #2d3148;border-radius:8px;padding:.5rem .75rem;color:#e2e8f0;font-size:.85rem">
            <option value="">— Réseau indépendant —</option>
            <template x-for="net in networks.filter(n => !n.parent_network_cid)" :key="net.network_cid">
              <option :value="net.network_cid" x-text="net.network_name"></option>
            </template>
          </select>
          <p style="font-size:.72rem;color:#475569;margin-top:.25rem">Relie ce réseau à un réseau parent (ex : un espace personnel dans un réseau famille).</p>
        </div>
      </template>
      <button class="btn btn-primary btn-full" @click="registerNetwork()" :disabled="!newNetworkName.trim() || creatingNet">
        <span x-text="creatingNet ? 'Création…' : 'Créer le réseau'"></span>
      </button>
    </div>
  </div>

  <!-- Modal : rejoindre un réseau -->
  <div class="modal-overlay" x-show="showJoinModal" x-cloak @click.self="showJoinModal = false">
    <div class="modal" style="max-width:480px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <h3>Rejoindre un réseau</h3>
        <button class="btn btn-ghost btn-sm" @click="showJoinModal = false">✕</button>
      </div>

      <!-- Onglets -->
      <div style="display:flex;gap:0;border:1px solid #2d3148;border-radius:8px;overflow:hidden;margin-bottom:1rem">
        <button type="button"
          @click="joinTab = 'directory'; loadPublicNetworks()"
          :style="joinTab === 'directory' ? 'background:#4f46e5;color:#fff' : 'background:none;color:#94a3b8'"
          style="flex:1;padding:0.5rem;border:none;cursor:pointer;font-size:0.82rem;transition:all 0.15s">
          🌐 Annuaire Civium
        </button>
        <button type="button"
          @click="joinTab = 'manual'"
          :style="joinTab === 'manual' ? 'background:#4f46e5;color:#fff' : 'background:none;color:#94a3b8'"
          style="flex:1;padding:0.5rem;border:none;border-left:1px solid #2d3148;cursor:pointer;font-size:0.82rem;transition:all 0.15s">
          🔗 Lien d'invitation
        </button>
      </div>

      <div class="msg msg-err" x-show="joinErr" x-text="joinErr" style="display:none"></div>

      <!-- Onglet annuaire -->
      <div x-show="joinTab === 'directory'">
        <template x-if="loadingPublicNets">
          <p style="text-align:center;color:#64748b;padding:1rem 0;font-size:.85rem">Chargement…</p>
        </template>
        <template x-if="!loadingPublicNets && publicNets.length === 0">
          <p style="text-align:center;color:#64748b;padding:1rem 0;font-size:.85rem">Aucun réseau public disponible.</p>
        </template>
        <div style="display:flex;flex-direction:column;gap:.5rem;max-height:320px;overflow-y:auto">
          <template x-for="net in publicNets" :key="net.network_cid">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:.6rem .75rem;background:#1a1d35;border:1px solid #2d3148;border-radius:8px">
              <div>
                <div style="display:flex;align-items:center;gap:.4rem">
                  <span style="font-weight:600;font-size:.9rem" x-text="net.network_name"></span>
                  <template x-if="net.is_main">
                    <span style="font-size:.65rem;background:#4f46e5;color:#fff;border-radius:4px;padding:1px 5px">Principal</span>
                  </template>
                </div>
                <div style="font-size:.72rem;color:#64748b;margin-top:.1rem" x-text="net.network_cid.substring(0,20) + '…'"></div>
              </div>
              <template x-if="isJoinedNet(net.network_cid)">
                <span style="font-size:.75rem;color:#22c55e">✓ Membre</span>
              </template>
              <template x-if="!isJoinedNet(net.network_cid)">
                <button class="btn btn-primary btn-sm"
                  @click="joinPublicNetwork(net.network_cid, net.network_name)"
                  :disabled="joiningPublicNet === net.network_cid">
                  <span x-text="joiningPublicNet === net.network_cid ? '…' : 'Rejoindre'"></span>
                </button>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Onglet lien d'invitation -->
      <div x-show="joinTab === 'manual'">
        <div class="field">
          <label>CID du réseau</label>
          <input type="text" x-model="joinCid" placeholder="civ1…" spellcheck="false">
        </div>
        <button class="btn btn-primary btn-full" @click="joinByManualCid()" :disabled="joining || !joinCid.trim()">
          <span x-text="joining ? 'Connexion…' : 'Rejoindre'"></span>
        </button>
      </div>
    </div>
  </div>

<script>
/* ── Constantes ── */
const BASE     = '{{ @BASE }}';
const HUB_URL  = '{{ @BASE }}'; // même serveur par défaut

/* ── IndexedDB helpers ── */
const DB_NAME = 'civium_web'; const DB_VER = 1; const DB_STORE = 'kv';
function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = () => reject(req.error);
  });
}
function idbGet(db, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(DB_STORE, 'readonly').objectStore(DB_STORE).get(key);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
function idbPut(db, key, val) {
  return new Promise((res, rej) => {
    const r = db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).put(val, key);
    r.onsuccess = () => res(); r.onerror = () => rej(r.error);
  });
}
function idbDel(db, key) {
  return new Promise((res, rej) => {
    const r = db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).delete(key);
    r.onsuccess = () => res(); r.onerror = () => rej(r.error);
  });
}

/* ── Crypto helpers ── */
async function deriveAesKey(pin, salt) {
  const enc  = new TextEncoder();
  const base = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptData(plaintext, pin) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveAesKey(pin, salt);
  const enc  = new TextEncoder();
  const ct   = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
  return { salt: [...salt], iv: [...iv], data: [...new Uint8Array(ct)] };
}
async function decryptData(stored, pin) {
  const salt = new Uint8Array(stored.salt);
  const iv   = new Uint8Array(stored.iv);
  const data = new Uint8Array(stored.data);
  const key  = await deriveAesKey(pin, salt);
  const pt   = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return new TextDecoder().decode(pt);
}

/* ── Base58 ── */
const B58_ALPHABET = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
function base58Decode(str) {
  let num = BigInt(0);
  for (const ch of str) {
    const idx = B58_ALPHABET.indexOf(ch);
    if (idx < 0) throw new Error('Caractère base58 invalide : ' + ch);
    num = num * 58n + BigInt(idx);
  }
  const bytes = [];
  while (num > 0n) { bytes.unshift(Number(num & 0xffn)); num >>= 8n; }
  for (const ch of str) { if (ch !== '1') break; bytes.unshift(0); }
  return new Uint8Array(bytes);
}
function base58Encode(bytes) {
  let num = 0n;
  for (const b of bytes) num = num * 256n + BigInt(b);
  let str = '';
  while (num > 0n) { str = B58_ALPHABET[Number(num % 58n)] + str; num /= 58n; }
  for (const b of bytes) { if (b !== 0) break; str = '1' + str; }
  return str;
}

/* ── Ed25519 signing via TweetNaCl ── */
function loadKeypair(secretB58) {
  const seed = base58Decode(secretB58);
  if (seed.length !== 32) throw new Error('La clé secrète doit faire 32 octets (44 caractères base58).');
  return nacl.sign.keyPair.fromSeed(seed);
}

function signMessage(keypair, message) {
  const encoded = new TextEncoder().encode(message);
  const sig = nacl.sign.detached(encoded, keypair.secretKey);
  return base58Encode(sig);
}

/* ── UUID simple ── */
function uuidv4() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

    async init() {
