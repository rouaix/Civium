    async doGenerate() {
      this.setupErr = '';
      const pin = this.setupPin;
      if (pin.length < 6) { this.setupErr = 'Le PIN doit faire au moins 6 caractères.'; return; }
      if (pin !== this.setupPin2) { this.setupErr = 'Les deux PIN ne correspondent pas.'; return; }
      if (!window.isSecureContext) { this.setupErr = 'Cette fonctionnalité requiert HTTPS. Accédez à l\'application via https:// ou localhost.'; return; }
      const blake3Fn = window._blake3;
      if (!blake3Fn) { this.setupErr = 'Module cryptographique non chargé. Rechargez la page.'; return; }
      this.setupLoading = true;
      try {
        const seed      = crypto.getRandomValues(new Uint8Array(32));
        const kp        = nacl.sign.keyPair.fromSeed(seed);
        const secretB58 = base58Encode(seed);
        const pubKeyB58 = base58Encode(kp.publicKey);
        const hash      = blake3Fn(kp.publicKey);
        const cidFull   = 'civ1' + base58Encode(hash);
        const cidShort  = cidFull.substring(0, 12);
        const displayName = this.setupDisplayName.trim() || cidShort;
        const enc = await encryptData(JSON.stringify({
          secret: secretB58, cid_full: cidFull, cid_short: cidShort,
          pub_key_b58: pubKeyB58, display_name: displayName,
        }), pin);
        await idbPut(idb, 'identity', enc);
        this.identity = { cid_short: cidShort, cid_full: cidFull, pub_key_b58: pubKeyB58, display_name: displayName };
        this.keypair  = kp;
        this.phase    = 'ready';
        this.setupDisplayName = ''; this.setupPin = ''; this.setupPin2 = '';
        await this.loadNetworks();
        this.autoJoinMainNetwork();
      } catch (e) {
        this.setupErr = 'Erreur lors de la génération : ' + e.message;
      } finally {
        this.setupLoading = false;
      }
    },

    async doSetup() {
      this.setupErr = '';
      const secret = this.setupSecret.trim();
      const cid    = this.setupCid.trim();
      const pin    = this.setupPin;
      if (!window.isSecureContext) { this.setupErr = 'Cette fonctionnalité requiert HTTPS. Accédez à l\'application via https:// ou localhost.'; return; }
      if (!secret)        { this.setupErr = 'La clé secrète est requise.'; return; }
      if (!cid.startsWith('civ1')) { this.setupErr = 'Le CID doit commencer par civ1.'; return; }
      if (pin.length < 6) { this.setupErr = 'Le PIN doit faire au moins 6 caractères.'; return; }
      if (pin !== this.setupPin2) { this.setupErr = 'Les deux PIN ne correspondent pas.'; return; }
      this.setupLoading = true;
      try {
        const kp = loadKeypair(secret);
        const pubKeyB58 = base58Encode(kp.publicKey);
        const cidShort = cid.substring(0, 12);
        const enc = await encryptData(JSON.stringify({
          secret, cid_full: cid, cid_short: cidShort, pub_key_b58: pubKeyB58, display_name: cidShort,
        }), pin);
        await idbPut(idb, 'identity', enc);
        this.identity = { cid_short: cidShort, cid_full: cid, pub_key_b58: pubKeyB58, display_name: cidShort };
        this.keypair  = kp;
        this.phase    = 'ready';
        this.setupSecret = ''; this.setupCid = ''; this.setupPin = ''; this.setupPin2 = '';
        await this.loadNetworks();
        this.autoJoinMainNetwork();
      } catch (e) {
        this.setupErr = 'Clé invalide ou erreur de chiffrement : ' + e.message;
      } finally {
        this.setupLoading = false;
      }
    },

    async doUnlock() {
      this.unlockErr = '';
      if (!window.isSecureContext) { this.unlockErr = 'Cette fonctionnalité requiert HTTPS. Accédez à l\'application via https:// ou localhost.'; return; }
      this.unlockLoading = true;
      try {
        const stored = await idbGet(idb, 'identity');
        if (!stored) { this.phase = 'setup'; return; }
        const json   = await decryptData(stored, this.unlockPin);
        const data   = JSON.parse(json);
        this.keypair  = loadKeypair(data.secret);
        this.identity = {
          cid_short:    data.cid_short,
          cid_full:     data.cid_full,
          pub_key_b58:  data.pub_key_b58,
          display_name: data.display_name || data.cid_short,
        };
        this.phase    = 'ready';
        this.unlockPin = '';
        await this.loadNetworks();
        this.autoJoinMainNetwork();
      } catch (e) {
        this.unlockErr = 'PIN incorrect ou clé corrompue.';
      } finally {
        this.unlockLoading = false;
      }
    },

    async registerNetwork() {
      this.createErr = '';
      if (!this.newNetworkName.trim() || !this.keypair || !this.identity) return;
      const blake3Fn = window._blake3;
      if (!blake3Fn) { this.createErr = 'Module cryptographique non chargé. Rechargez la page.'; return; }
      this.creatingNet = true;
      try {
        const seed       = crypto.getRandomValues(new Uint8Array(32));
        const hash       = blake3Fn(seed);
        const networkCid = 'civ1' + base58Encode(hash);
        const ts          = Math.floor(Date.now() / 1000);
        const networkName = this.newNetworkName.trim();
        const canonical   = `register|${networkCid}|${networkName}|${this.identity.cid_full}|${ts}`;
        const sig         = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/network/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid:  networkCid,
            network_name: networkName,
            admin_cid:    this.identity.cid_full,
            admin_pubkey: this.identity.pub_key_b58,
            timestamp:    ts,
            signature:    sig,
            is_public:           this.newNetworkPublic,
            parent_network_cid:  this.newNetworkParent || null,
          }),
        });
        if (r.ok || r.status === 201) {
          // Enregistrement RCC (registre légal obligatoire) — en arrière-plan, non bloquant
          fetch(BASE + '/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              network_cid:  networkCid,
              network_name: networkName,
              admin_cid:    this.identity.cid_full,
              admin_pubkey: this.identity.pub_key_b58,
              admin_email:  '',
              ip:           '',
              registered_at: new Date().toISOString(),
              signature:    sig,
            }),
          }).catch(() => {});

          await this.loadNetworks();
          const net = this.networks.find(n => n.network_cid === networkCid);
          if (net) await this.selectNetwork(net);
          this.showCreateModal = false;
          this.newNetworkName = ''; this.newNetworkDesc = ''; this.newNetworkPublic = false; this.newNetworkParent = '';
        } else {
          const d = await r.json().catch(() => ({}));
          this.createErr = 'Erreur : ' + (d.error || r.status);
        }
      } catch (e) {
        this.createErr = 'Erreur réseau : ' + e.message;
      } finally {
        this.creatingNet = false;
      }
    },

    async resetKey() {
      if (!confirm('Supprimer la clé de cet appareil ? Vous devrez la saisir à nouveau.')) return;
      if (idb) await idbDel(idb, 'identity');
      this.identity = null; this.keypair = null; this.phase = 'setup'; this.setupMode = null;
    },

    async loadFraudAlerts() {
      try {
        const r = await fetch(BASE + '/api/alerts');
        if (r.ok) { const d = await r.json(); this.fraudAlerts = d.alerts || []; }
      } catch (_) {}
    },

    async loadNetworks() {
      try {
        const r = await fetch(this.hubUrl + '/hub/network/list');
        if (!r.ok) { this.hubConnected = false; return; }
        const d = await r.json();
        this.networks = (d.networks || []).map(n => ({
          ...n,
          is_joined: this.isJoinedNet(n.network_cid),
        }));
        this.hubConnected = true;
      } catch (_) { this.hubConnected = false; }
    },

    isJoinedNet(networkCid) {
      return this.networks.some(n => n.network_cid === networkCid && n.is_joined);
    },

    async loadPublicNetworks() {
      this.loadingPublicNets = true;
      try {
        const r = await fetch(this.hubUrl + '/hub/network/public');
        if (r.ok) {
          const d = await r.json();
          this.publicNets = d.networks || [];
        }
      } catch (_) {} finally { this.loadingPublicNets = false; }
    },

    async joinPublicNetwork(networkCid, networkName) {
      if (!this.keypair || !this.identity) return;
      this.joiningPublicNet = networkCid;
      this.joinErr = '';
      try {
        const ts = Math.floor(Date.now() / 1000);
        const displayName = this.identity.display_name || this.identity.cid_short;
        const canonical = `join|${networkCid}|${this.identity.cid_full}|${displayName}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/member/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid:  networkCid,
            member_cid:   this.identity.cid_full,
            display_name: displayName,
            pubkey_b58:   this.identity.pub_key_b58,
            timestamp:    ts,
            signature:    sig,
          }),
        });
        if (r.ok || r.status === 201) {
          await this.loadNetworks();
          const net = this.networks.find(n => n.network_cid === networkCid);
          if (net) { await this.selectNetwork(net); }
          this.showJoinModal = false;
        } else {
          const d = await r.json().catch(() => ({}));
          this.joinErr = 'Erreur : ' + (d.error || r.status);
        }
      } catch (e) { this.joinErr = 'Erreur réseau : ' + e.message; }
      finally { this.joiningPublicNet = null; }
    },

    async autoJoinMainNetwork() {
      // 1. Rejoindre depuis un lien d'invitation URL (?join=CID)
      if (this.pendingJoinCid) {
        const cid  = this.pendingJoinCid;
        const name = this.pendingJoinName;
        this.pendingJoinCid = '';
        const alreadyIn = this.networks.some(n => n.network_cid === cid);
        if (!alreadyIn) await this.joinPublicNetwork(cid, name);
        return; // ne pas auto-rejoindre le réseau principal en plus
      }
      // 2. Rejoindre automatiquement le réseau principal Civium
      try {
        const r = await fetch(this.hubUrl + '/hub/main-network');
        if (!r.ok) return;
        const d = await r.json();
        const mainCid = d.network_cid;
        if (!mainCid) return;
        const alreadyJoined = this.networks.some(n => n.network_cid === mainCid);
        if (alreadyJoined) return;
        await this.joinPublicNetwork(mainCid, d.network_name || 'Civium');
      } catch (_) {}
    },

    async loadMembers() {
      if (!this.selectedNet) return;
      try {
        const r = await fetch(this.hubUrl + '/hub/member/list?network_cid=' + encodeURIComponent(this.selectedNet.network_cid));
        if (r.ok) {
          const d = await r.json();
          this.members = d.members || [];
          this.isJoined = this.members.some(m => m.member_cid === this.identity?.cid_full);
        }
      } catch (_) {}
    },

    async syncNetwork() {
      if (!this.selectedNet || !this.isJoined || !this.keypair || !this.identity) return;
      this.syncing = true;
      try {
        const since     = 0; // pull depuis le début
        const timestamp = Math.floor(Date.now() / 1000);
        const canonical = `pull|${this.selectedNet.network_cid}|${this.identity.cid_full}|${since}|${timestamp}`;
        const sig       = signMessage(this.keypair, canonical);
        const url = this.hubUrl + '/hub/sync/pull'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&since='       + since
          + '&timestamp='   + timestamp
          + '&signature='   + encodeURIComponent(sig);
        const r = await fetch(url);
        if (r.ok) {
          const d = await r.json();
          this.messages = (d.messages || []);
          this.$nextTick(() => {
            const el = this.$refs?.msgBottom;
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          });
        }
      } catch (_) {} finally { this.syncing = false; }
    },

    async joinNetwork() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;

      try {
        const ts  = Math.floor(Date.now() / 1000);

        const canonical = `join|${this.selectedNet.network_cid}|${this.identity.cid_full}|${displayName}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/member/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid,
            member_cid:  this.identity.cid_full,
            display_name: displayName,
            pubkey_b58:  this.identity.pub_key_b58,
            timestamp:   ts,
            signature:   sig,
          }),
        });
        if (r.ok) {
          this.isJoined = true;
          await this.loadMembers();
        } else {
          const d = await r.json();
          alert('Erreur : ' + (d.error || r.status));

    },

    async castVote(proposalId, choice) {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      this.votingProposal = proposalId;
      try {
        const ts = Math.floor(Date.now() / 1000);
        const canonical = `vote|${proposalId}|${this.selectedNet.network_cid}|${this.identity.cid_full}|${choice}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/governance/vote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            proposal_id: proposalId,
            network_cid: this.selectedNet.network_cid,
            member_cid:  this.identity.cid_full,
            choice,
            timestamp:   ts,
            signature:   sig,
          }),
        });
        if (r.ok) {
          await this.loadProposals();
        } else {
          const d = await r.json().catch(() => ({}));
          alert('Erreur : ' + (d.error || r.status));
        }
      } catch (e) { alert('Erreur réseau : ' + e.message); }
      finally { this.votingProposal = null; }
    },

    async loadAgenda() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      this.loadingAgenda = true;
      try {
        const ts = Math.floor(Date.now() / 1000);
        const canonical = `agenda_list|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const url = this.hubUrl + '/hub/agenda/events'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&timestamp='   + ts
          + '&signature='   + encodeURIComponent(sig);
        const r = await fetch(url);
        if (r.ok) { const d = await r.json(); this.agendaEvents = d.events || []; }
      } catch (_) {} finally { this.loadingAgenda = false; }
    },

    async createEvent() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      if (!this.newEventTitle.trim() || !this.newEventStart) return;
      this.creatingEvent = true;
      try {
        const ts = Math.floor(Date.now() / 1000);
        const canonical = `agenda|${this.selectedNet.network_cid}|${this.identity.cid_full}|${this.newEventTitle.trim()}|${this.newEventStart}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/agenda/event', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid:  this.selectedNet.network_cid,
            member_cid:   this.identity.cid_full,
            title:        this.newEventTitle.trim(),
            description:  this.newEventDesc.trim(),
            start_at:     this.newEventStart,
            end_at:       this.newEventEnd || null,
            timestamp:    ts,
            signature:    sig,
          }),
        });
        if (r.ok || r.status === 201) {
          this.showCreateEvent = false;
          this.newEventTitle = ''; this.newEventDesc = '';
          this.newEventStart = ''; this.newEventEnd = '';
          await this.loadAgenda();
        } else {
          const d = await r.json().catch(() => ({}));
          alert('Erreur : ' + (d.error || r.status));
        }
      } catch (e) { alert('Erreur réseau : ' + e.message); }
      finally { this.creatingEvent = false; }
    },

    async sendMessage() {
      if (!this.selectedNet || !this.msgText.trim() || !this.keypair) return;
      this.sending = true;
      const body = this.msgText.trim();
      this.msgText = '';
      try {
        const ts = Math.floor(Date.now() / 1000);
        const id = uuidv4();
        const displayName = this.identity.display_name || this.identity.cid_short || this.identity.cid_full.substring(0, 12);
        const msgPayload = {
          id, body, sender_cid: this.identity.cid_full,
          sender_name: displayName, sent_at: ts,
        };
        const canonical = `push|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/sync/push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid,
            member_cid:  this.identity.cid_full,
            timestamp:   ts,
            signature:   sig,
            messages:    [msgPayload],
          }),
        });
        if (r.ok) {
          this.messages.push(msgPayload);
          this.$nextTick(() => { const el = this.$refs?.msgBottom; if (el) el.scrollIntoView({ behavior: 'smooth' }); });
        } else {
          const d = await r.json();
          this.msgText = body;
          alert('Erreur d\'envoi : ' + (d.error || r.status));
        }
      } catch (e) { this.msgText = body; alert('Erreur réseau : ' + e.message); }
      finally { this.sending = false; }
    },

    isMine(msg) {
      return msg.sender_cid === this.identity?.cid_full;
    },

    exportData() {
      const data = {
        exported_at:  new Date().toISOString(),
        identity: {
          cid_full:     this.identity?.cid_full,
          cid_short:    this.identity?.cid_short,
          pub_key_b58:  this.identity?.pub_key_b58,
          display_name: this.identity?.display_name,
        },
        networks:      this.networks,
        messages:      this.messages,
        documents:     this.documents,
        proposals:     this.proposals,
        agendaEvents:  this.agendaEvents,
        notifications: this.notifications,
        conversations: this.conversations,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `civium-export-${new Date().toISOString().substring(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },

    // ── Documents ─────────────────────────────────────────────────────────────

    async loadDocuments() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      this.loadingDocs = true;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `document_list|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`);
        const url = this.hubUrl + '/hub/documents'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&timestamp='   + ts + '&signature=' + encodeURIComponent(sig);
        const r = await fetch(url);
        if (r.ok) { const d = await r.json(); this.documents = d.documents || []; }
      } catch (_) {} finally { this.loadingDocs = false; }
    },

    editDocument(doc) {
      this.editingDoc    = doc;
      this.newDocTitle   = doc.title;
      this.newDocContent = doc.content;
      this.showCreateDoc = true;
    },

    cancelDocEdit() {
      this.showCreateDoc = false;
      this.editingDoc    = null;
      this.newDocTitle   = '';
      this.newDocContent = '';
    },

    async saveDocument() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      if (!this.newDocTitle.trim()) return;
      this.savingDoc = true;
      try {
        const ts = Math.floor(Date.now() / 1000);
        if (this.editingDoc) {
          const sig = signMessage(this.keypair, `document_update|${this.selectedNet.network_cid}|${this.identity.cid_full}|${this.editingDoc.id}|${ts}`);
          const r = await fetch(this.hubUrl + '/hub/document', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              network_cid: this.selectedNet.network_cid, member_cid: this.identity.cid_full,
              id: this.editingDoc.id, title: this.newDocTitle.trim(), content: this.newDocContent,
              timestamp: ts, signature: sig,
            }),
          });
          if (!r.ok) { const d = await r.json().catch(() => ({})); alert('Erreur : ' + (d.error || r.status)); return; }
        } else {
          const sig = signMessage(this.keypair, `document_create|${this.selectedNet.network_cid}|${this.identity.cid_full}|${this.newDocTitle.trim()}|${ts}`);
          const r = await fetch(this.hubUrl + '/hub/document', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              network_cid: this.selectedNet.network_cid, member_cid: this.identity.cid_full,
              title: this.newDocTitle.trim(), content: this.newDocContent,
              timestamp: ts, signature: sig,
            }),
          });
          if (!r.ok) { const d = await r.json().catch(() => ({})); alert('Erreur : ' + (d.error || r.status)); return; }
        }
        this.cancelDocEdit();
        await this.loadDocuments();
      } catch (e) { alert('Erreur réseau : ' + e.message); }
      finally { this.savingDoc = false; }
    },

    async deleteDocument(docId) {
      if (!confirm('Supprimer ce document ?')) return;
      this.deletingDoc = docId;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `document_delete|${this.selectedNet.network_cid}|${this.identity.cid_full}|${docId}|${ts}`);
        const r = await fetch(this.hubUrl + '/hub/document', {
          method: 'DELETE', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid, member_cid: this.identity.cid_full,
            id: docId, timestamp: ts, signature: sig,
          }),
        });
        if (!r.ok) { const d = await r.json().catch(() => ({})); alert('Erreur : ' + (d.error || r.status)); return; }
        await this.loadDocuments();
      } catch (e) { alert('Erreur réseau : ' + e.message); }
      finally { this.deletingDoc = null; }
    },

    // ── Annuaire ──────────────────────────────────────────────────────────────

    async loadDirectory() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      this.loadingDirectory = true;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `directory|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`);
        const url = this.hubUrl + '/hub/directory'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&timestamp='   + ts + '&signature=' + encodeURIComponent(sig)
          + (this.directoryQuery ? '&q=' + encodeURIComponent(this.directoryQuery) : '');
        const r = await fetch(url);
        if (r.ok) { const d = await r.json(); this.directoryMembers = d.members || []; }
      } catch (_) {} finally { this.loadingDirectory = false; }
    },

    openDmWith(member) {
      this.view = 'dms';
      this.activeDmPeer = { other_cid: member.member_cid, other_name: member.display_name || member.member_cid };
      this.activeDmThread = [];
      this.loadDmThread(member.member_cid);
    },

    // ── Messages directs ──────────────────────────────────────────────────────

    async loadConversations() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      this.loadingConversations = true;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `dm_conversations|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`);
        const url = this.hubUrl + '/hub/dms/conversations'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&timestamp='   + ts + '&signature=' + encodeURIComponent(sig);
        const r = await fetch(url);
        if (r.ok) { const d = await r.json(); this.conversations = d.conversations || []; }
      } catch (_) {} finally { this.loadingConversations = false; }
    },

    openDmConv(conv) {
      this.activeDmPeer = conv;
      this.activeDmThread = [];
      this.loadDmThread(conv.other_cid);
    },

    async loadDmThread(otherCid) {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `dm_list|${this.selectedNet.network_cid}|${this.identity.cid_full}|${otherCid}|${ts}`);
        const url = this.hubUrl + '/hub/dms'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&other_cid='   + encodeURIComponent(otherCid)
          + '&timestamp='   + ts + '&signature=' + encodeURIComponent(sig);
        const r = await fetch(url);
        if (r.ok) {
          const d = await r.json();
          this.activeDmThread = d.dms || [];
          this.$nextTick(() => { const el = this.$refs?.dmBottom; if (el) el.scrollIntoView({ behavior: 'smooth' }); });
        }
      } catch (_) {}
    },

    async sendDm() {
      if (!this.selectedNet || !this.activeDmPeer || !this.keypair || !this.identity) return;
      const body = this.dmText.trim();
      if (!body) return;
      this.sendingDm = true;
      this.dmText = '';
      try {
        const ts = Math.floor(Date.now() / 1000);
        const displayName = this.identity.display_name || this.identity.cid_short;
        const sig = signMessage(this.keypair, `dm|${this.selectedNet.network_cid}|${this.identity.cid_full}|${this.activeDmPeer.other_cid}|${ts}`);
        const r = await fetch(this.hubUrl + '/hub/dm', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid,
            sender_cid: this.identity.cid_full, recipient_cid: this.activeDmPeer.other_cid,
            sender_name: displayName, body, timestamp: ts, signature: sig,
          }),
        });
        if (r.ok) {
          this.activeDmThread.push({
            id: uuidv4(), sender_cid: this.identity.cid_full,
            recipient_cid: this.activeDmPeer.other_cid,
            sender_name: displayName, body,
            sent_at: new Date().toISOString(),
          });
          this.$nextTick(() => { const el = this.$refs?.dmBottom; if (el) el.scrollIntoView({ behavior: 'smooth' }); });
        } else {
          this.dmText = body;
          const d = await r.json().catch(() => ({}));
          alert('Erreur : ' + (d.error || r.status));
        }
      } catch (e) { this.dmText = body; alert('Erreur réseau : ' + e.message); }
      finally { this.sendingDm = false; }
    },

    // ── Notifications ─────────────────────────────────────────────────────────

    async loadNotifications() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      this.loadingNotifs = true;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `notifications|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`);
        const url = this.hubUrl + '/hub/notifications'
          + '?network_cid=' + encodeURIComponent(this.selectedNet.network_cid)
          + '&member_cid='  + encodeURIComponent(this.identity.cid_full)
          + '&timestamp='   + ts + '&signature=' + encodeURIComponent(sig);
        const r = await fetch(url);
        if (r.ok) {
          const d = await r.json();
          this.notifications = d.notifications || [];
          this.unreadNotifs  = d.unread || 0;
        }
      } catch (_) {} finally { this.loadingNotifs = false; }
    },

    async markAllRead() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair, `notifications_read|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`);
        await fetch(this.hubUrl + '/hub/notifications/read', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid, member_cid: this.identity.cid_full,
            timestamp: ts, signature: sig, ids: [],
          }),
        });
        this.notifications.forEach(n => n.is_read = 1);
        this.unreadNotifs = 0;
      } catch (_) {}
    },

    // ── Quitter un réseau ────────────────────────────────────────────────────

    async leaveNetwork() {
      if (!this.selectedNet || !this.keypair || !this.identity) return;
      if (!confirm('Quitter le réseau « ' + this.selectedNet.network_name + ' » ?')) return;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const canonical = `leave|${this.selectedNet.network_cid}|${this.identity.cid_full}|${ts}`;
        const sig = signMessage(this.keypair, canonical);
        const r = await fetch(this.hubUrl + '/hub/member/leave', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid,
            member_cid:  this.identity.cid_full,
            timestamp:   ts,
            signature:   sig,
          }),
        });
        if (r.ok) {
          this.isJoined = false;
          this.messages = [];
          await this.loadMembers();
        } else {
          const d = await r.json().catch(() => ({}));
          alert('Erreur : ' + (d.error || r.status));
        }
      } catch (e) { alert('Erreur réseau : ' + e.message); }
    },

    // ── Agenda — modifier / supprimer ────────────────────────────────────────

    startEditEvent(ev) {
      this.editingEvent  = ev;
      this.editEventTitle = ev.title;
      this.editEventDesc  = ev.description || '';
      // Format datetime-local value (YYYY-MM-DDTHH:mm)
      this.editEventStart = ev.start_at ? ev.start_at.substring(0, 16) : '';
      this.editEventEnd   = ev.end_at   ? ev.end_at.substring(0, 16)   : '';
    },

    async updateEvent() {
      if (!this.editingEvent || !this.keypair || !this.identity) return;
      if (!this.editEventTitle.trim() || !this.editEventStart) return;
      this.updatingEvent = true;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair,
          `agenda_update|${this.selectedNet.network_cid}|${this.identity.cid_full}|${this.editingEvent.id}|${ts}`);
        const r = await fetch(this.hubUrl + '/hub/agenda/event', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid,
            member_cid:  this.identity.cid_full,
            id:          this.editingEvent.id,
            title:       this.editEventTitle.trim(),
            description: this.editEventDesc.trim(),
            start_at:    this.editEventStart,
            end_at:      this.editEventEnd || null,
            timestamp:   ts,
            signature:   sig,
          }),
        });
        if (r.ok) {
          this.editingEvent = null;
          await this.loadAgenda();
        } else {
          const d = await r.json().catch(() => ({}));
          alert('Erreur : ' + (d.error || r.status));
        }
      } catch (e) { alert('Erreur réseau : ' + e.message); }
      finally { this.updatingEvent = false; }
    },

    async deleteEvent(eventId) {
      if (!confirm('Supprimer cet événement ?')) return;
      this.deletingEvent = eventId;
      try {
        const ts  = Math.floor(Date.now() / 1000);
        const sig = signMessage(this.keypair,
          `agenda_delete|${this.selectedNet.network_cid}|${this.identity.cid_full}|${eventId}|${ts}`);
        const r = await fetch(this.hubUrl + '/hub/agenda/event', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            network_cid: this.selectedNet.network_cid,
            member_cid:  this.identity.cid_full,
            id:          eventId,
            timestamp:   ts,
            signature:   sig,
          }),
        });
        if (r.ok) {
          await this.loadAgenda();
        } else {
          const d = await r.json().catch(() => ({}));
          alert('Erreur : ' + (d.error || r.status));
        }
      } catch (e) { alert('Erreur réseau : ' + e.message); }
      finally { this.deletingEvent = null; }
    },

    // ── Rendu Markdown ───────────────────────────────────────────────────────

    renderMarkdown(text) {
      if (!text) return '';
      if (typeof marked === 'undefined') return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return marked.parse(text, { breaks: true, gfm: true });
    },
  };
};
</script>
