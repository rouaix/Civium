<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réseau Civium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="networkApp()" x-cloak>

  <!-- Barre de navigation -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <!-- Ligne supérieure : réseau actif + actions -->
    <div class="max-w-4xl mx-auto px-4 h-10 flex items-center justify-between border-b border-gray-100">
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">Réseau :</span>
        <span class="text-sm font-semibold text-indigo-700" x-text="currentNetwork.name || '…'"></span>
        <!-- Sélecteur de réseau -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open" class="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1">
            <span x-text="myNetworks.length > 1 ? '▼ Changer' : ''"></span>
          </button>
          <div x-show="open" @click.outside="open = false" x-cloak
               class="absolute left-0 top-6 bg-white border border-gray-200 rounded-xl shadow-lg z-20 min-w-48 py-1">
            <template x-for="n in myNetworks" :key="n.id">
              <button @click="switchToNetwork(n.id); open = false"
                :class="n.id === currentNetwork.id ? 'bg-indigo-50 text-indigo-700 font-semibold' : 'text-gray-700 hover:bg-gray-50'"
                class="w-full text-left px-4 py-2 text-sm">
                <span x-text="n.name"></span>
                <span x-show="n.id === currentNetwork.id" class="ml-1 text-xs text-indigo-400">✓</span>
              </button>
            </template>
            <div class="border-t border-gray-100 mt-1 pt-1">
              <button @click="showCreateNetwork = true; open = false"
                class="w-full text-left px-4 py-2 text-sm text-indigo-600 hover:bg-indigo-50">
                + Créer un nouveau réseau
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-500" x-text="member.display_name"></span>
        <a href="{{ @base }}/auth/deconnexion" class="text-xs text-gray-400 hover:text-gray-600">Déconnexion</a>
      </div>
    </div>
    <!-- Ligne inférieure : onglets -->
    <div class="max-w-4xl mx-auto px-4 flex gap-1 h-10 items-center">
      <template x-for="tab in tabs" :key="tab.id">
        <button @click="activeTab = tab.id"
          :class="activeTab === tab.id ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-500 hover:text-gray-700'"
          class="px-3 py-1.5 rounded-lg text-sm transition-colors">
          <span x-text="tab.label"></span>
          <span x-show="tab.id === 'notifications' && unreadCount > 0"
            class="ml-1 bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5" x-text="unreadCount"></span>
        </button>
      </template>
    </div>
  </header>

  <!-- Modal : créer un réseau -->
  <div x-show="showCreateNetwork" x-cloak
       class="fixed inset-0 bg-black/40 z-30 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8 space-y-5">
      <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-gray-900">Créer un réseau</h2>
        <button @click="showCreateNetwork = false" class="text-gray-400 hover:text-gray-600">✕</button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Nom du réseau</label>
          <input x-model="newNetwork.name" type="text" placeholder="Ex : Famille Martin, Équipe projet…"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-xs font-normal text-gray-400">(facultatif)</span></label>
          <textarea x-model="newNetwork.description" rows="2" placeholder="À quoi sert ce réseau ?"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
        </div>
        <div class="flex items-center gap-3">
          <input id="is-public" type="checkbox" x-model="newNetwork.is_public"
            class="h-4 w-4 rounded border-gray-300 text-indigo-600">
          <label for="is-public" class="text-sm text-gray-700 cursor-pointer">
            Réseau ouvert <span class="text-xs text-gray-400">(les membres peuvent inviter d'autres personnes)</span>
          </label>
        </div>
        <div x-show="createNetworkError" class="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2" x-text="createNetworkError"></div>
        <button @click="createNetwork()"
          :disabled="!newNetwork.name.trim() || creatingNetwork"
          class="w-full py-2.5 bg-indigo-600 text-white rounded-xl font-semibold text-sm hover:bg-indigo-700 disabled:opacity-50 transition-colors">
          <span x-show="!creatingNetwork">Créer le réseau</span>
          <span x-show="creatingNetwork">Création…</span>
        </button>
      </div>
    </div>
  </div>

  <main class="max-w-4xl mx-auto px-4 py-6">

    <!-- FIL D'ACTIVITÉ -->
    <div x-show="activeTab === 'activite'">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Fil d'activité</h2>
      <div class="space-y-2">
        <template x-if="activity.length === 0">
          <p class="text-sm text-gray-400 text-center py-8">Aucune activité pour l'instant.</p>
        </template>
        <template x-for="e in activity" :key="e.id">
          <div class="bg-white border border-gray-100 rounded-xl px-4 py-3 flex items-start gap-3">
            <span class="text-lg" x-text="kindIcon(e.kind)"></span>
            <div>
              <p class="text-sm text-gray-800" x-text="e.summary"></p>
              <p class="text-xs text-gray-400 mt-0.5" x-text="formatDate(e.occurred_at)"></p>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- MESSAGES -->
    <div x-show="activeTab === 'messages'">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Messages du réseau</h2>
      </div>

      <!-- Composer -->
      <div class="bg-white border border-gray-200 rounded-xl p-4 mb-4">
        <textarea x-model="newMessage" placeholder="Écrire un message…" rows="2"
          class="w-full text-sm border border-gray-100 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none placeholder:text-gray-400"></textarea>
        <div class="flex justify-end mt-2">
          <button @click="sendMessage()" :disabled="!newMessage.trim() || sending"
            class="text-xs bg-indigo-600 text-white px-4 py-1.5 rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-colors">
            <span x-show="!sending">Envoyer</span>
            <span x-show="sending">…</span>
          </button>
        </div>
      </div>

      <!-- Liste -->
      <div class="space-y-3">
        <template x-if="messages.length === 0">
          <p class="text-sm text-gray-400 text-center py-8">Aucun message. Soyez le premier à écrire !</p>
        </template>
        <template x-for="m in messages" :key="m.id">
          <div class="bg-white border border-gray-100 rounded-xl px-4 py-3">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-sm font-medium text-gray-800" x-text="m.author_name"></span>
              <span class="text-xs text-gray-400 font-mono" x-text="m.author_cid"></span>
              <span class="text-xs text-gray-300 ml-auto" x-text="formatDate(m.sent_at)"></span>
            </div>
            <p class="text-sm text-gray-700 whitespace-pre-wrap" x-text="m.body"></p>
          </div>
        </template>
      </div>
    </div>

    <!-- MEMBRES -->
    <div x-show="activeTab === 'membres'">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Membres</h2>
      <div class="bg-white border border-gray-100 rounded-xl divide-y divide-gray-50">
        <template x-if="members.length === 0">
          <p class="text-sm text-gray-400 text-center py-8">Aucun membre actif.</p>
        </template>
        <template x-for="m in members" :key="m.cid_short">
          <div class="flex items-center px-4 py-3 gap-3">
            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-sm font-bold text-indigo-700"
              x-text="m.display_name ? m.display_name[0].toUpperCase() : '?'"></div>
            <div>
              <div class="text-sm font-medium text-gray-800" x-text="m.display_name"></div>
              <div class="text-xs text-gray-400 font-mono" x-text="m.cid_short"></div>
            </div>
            <span x-show="m.role === 'admin'" class="ml-auto text-xs bg-indigo-100 text-indigo-700 rounded-full px-2 py-0.5">Admin</span>
          </div>
        </template>
      </div>
    </div>

    <!-- GOUVERNANCE -->
    <div x-show="activeTab === 'gouvernance'">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Propositions</h2>
        <button @click="showProposalForm = !showProposalForm"
          class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition-colors">
          + Nouvelle proposition
        </button>
      </div>

      <!-- Formulaire nouvelle proposition -->
      <div x-show="showProposalForm" class="bg-white border border-gray-200 rounded-xl p-4 mb-4 space-y-3">
        <input x-model="newProposal.title" placeholder="Titre de la proposition"
          class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <textarea x-model="newProposal.description" placeholder="Description…" rows="2"
          class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 resize-none"></textarea>
        <div class="space-y-1">
          <p class="text-xs text-gray-500 font-medium">Options de vote</p>
          <template x-for="(opt, i) in newProposal.options" :key="i">
            <div class="flex gap-2">
              <input :value="opt" @input="newProposal.options[i] = $event.target.value"
                :placeholder="'Option ' + (i+1)"
                class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-400">
              <button x-show="newProposal.options.length > 2" @click="newProposal.options.splice(i,1)"
                class="text-red-400 hover:text-red-600 text-sm px-1">✕</button>
            </div>
          </template>
          <button @click="newProposal.options.push('')" class="text-xs text-indigo-600 hover:underline">+ Ajouter une option</button>
        </div>
        <div class="flex gap-4 text-xs text-gray-600">
          <label>Durée :
            <select x-model="newProposal.days_open" class="ml-1 border border-gray-200 rounded px-1 py-0.5">
              <option value="1">1 jour</option>
              <option value="3">3 jours</option>
              <option value="7" selected>7 jours</option>
              <option value="14">14 jours</option>
              <option value="30">30 jours</option>
            </select>
          </label>
          <label>Quorum :
            <input type="number" x-model="newProposal.quorum" min="1" max="100"
              class="ml-1 w-14 border border-gray-200 rounded px-1 py-0.5 text-center">%
          </label>
        </div>
        <div class="flex gap-3">
          <button @click="showProposalForm = false" class="text-sm text-gray-400 hover:text-gray-600">Annuler</button>
          <button @click="createProposal()" :disabled="!newProposal.title.trim() || sending"
            class="text-xs bg-indigo-600 text-white px-4 py-1.5 rounded-lg hover:bg-indigo-700 disabled:opacity-50 transition-colors">
            Soumettre
          </button>
        </div>
      </div>

      <!-- Liste propositions -->
      <div class="space-y-3">
        <template x-if="proposals.length === 0">
          <p class="text-sm text-gray-400 text-center py-8">Aucune proposition pour l'instant.</p>
        </template>
        <template x-for="p in proposals" :key="p.id">
          <div class="bg-white border border-gray-100 rounded-xl p-4">
            <div class="flex items-start justify-between gap-2 mb-2">
              <h3 class="text-sm font-semibold text-gray-800" x-text="p.title"></h3>
              <span class="text-xs rounded-full px-2 py-0.5 shrink-0"
                :class="p.status === 'open' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                x-text="p.status === 'open' ? 'Ouverte' : 'Fermée'"></span>
            </div>
            <p class="text-xs text-gray-500 mb-3" x-text="p.description"></p>
            <div class="space-y-1.5" x-show="p.status === 'open'">
              <template x-for="(opt, i) in p.options" :key="i">
                <button @click="castVote(p.id, i)"
                  class="w-full text-left text-sm px-3 py-2 border border-gray-200 rounded-lg hover:border-indigo-400 hover:bg-indigo-50 transition-colors"
                  x-text="opt"></button>
              </template>
            </div>
            <p class="text-xs text-gray-400 mt-2">
              Ferme le <span x-text="formatDate(p.closes_at)"></span> · <span x-text="p.vote_count"></span> vote(s)
            </p>
          </div>
        </template>
      </div>
    </div>

    <!-- ANNUAIRE -->
    <div x-show="activeTab === 'annuaire'">
      <div class="flex items-center gap-2 mb-4">
        <input x-model="dirQuery" @keydown.enter="searchDir()" placeholder="Rechercher dans l'annuaire…"
          class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <button @click="searchDir()" class="text-xs bg-white border border-gray-200 text-gray-600 px-3 py-2 rounded-lg hover:bg-gray-50">
          Rechercher
        </button>
      </div>
      <div class="space-y-2">
        <template x-if="dirEntries.length === 0">
          <p class="text-sm text-gray-400 text-center py-8">Aucune entrée dans l'annuaire.</p>
        </template>
        <template x-for="e in dirEntries" :key="e.id">
          <div class="bg-white border border-gray-100 rounded-xl px-4 py-3">
            <div class="flex items-center gap-2 mb-0.5">
              <span class="text-xs bg-gray-100 text-gray-500 rounded-full px-2 py-0.5"
                x-text="e.kind === 'network' ? 'Réseau' : 'Membre'"></span>
              <span class="text-sm font-medium text-gray-800" x-text="e.subject_name"></span>
            </div>
            <p class="text-xs text-gray-500" x-text="e.description"></p>
            <div class="flex gap-1 mt-1 flex-wrap">
              <template x-for="tag in e.tags" :key="tag">
                <span class="text-xs bg-indigo-50 text-indigo-600 rounded-full px-2 py-0.5" x-text="tag"></span>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div x-show="activeTab === 'notifications'">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">Notifications</h2>
        <button @click="markAllRead()" x-show="unreadCount > 0" class="text-xs text-indigo-600 hover:underline">
          Tout marquer comme lu
        </button>
      </div>
      <div class="space-y-2">
        <template x-if="notifications.length === 0">
          <p class="text-sm text-gray-400 text-center py-8">Aucune notification.</p>
        </template>
        <template x-for="n in notifications" :key="n.id">
          <div @click="markRead(n)" class="bg-white border rounded-xl px-4 py-3 flex items-start gap-3 cursor-pointer transition-colors"
            :class="n.read_flag ? 'border-gray-100' : 'border-indigo-200 bg-indigo-50'">
            <span class="text-lg" x-text="kindIcon(n.kind)"></span>
            <div>
              <p class="text-sm text-gray-800" x-text="n.summary"></p>
              <p class="text-xs text-gray-400 mt-0.5" x-text="formatDate(n.created_at)"></p>
            </div>
          </div>
        </template>
      </div>
    </div>

  </main>

<script>
const BASE = '{{ @base }}';
const MEMBER = {
  cid_short:    '{{ @member.cid_short | raw }}',
  display_name: '{{ @member.display_name | raw }}',
  role:         '{{ @member.role | raw }}',
};
const CURRENT_NETWORK = {
  id:   '{{ @network_id | raw }}',
  name: '{{ @network_name | raw }}',
};
const MY_NETWORKS = {{ @my_networks_json | raw }};

function networkApp() {
  return {
    member: MEMBER,
    currentNetwork: CURRENT_NETWORK,
    myNetworks: MY_NETWORKS,
    activeTab: 'activite',
    tabs: [
      { id: 'activite',     label: 'Activité' },
      { id: 'messages',     label: 'Messages' },
      { id: 'membres',      label: 'Membres' },
      { id: 'gouvernance',  label: 'Gouvernance' },
      { id: 'annuaire',     label: 'Annuaire' },
      { id: 'notifications',label: 'Notifications' },
    ],

    get activeTabWatcher() { return this.activeTab; },

    activity:       [],
    messages:       [],
    members:        [],
    proposals:      [],
    dirEntries:     [],
    notifications:  [],
    unreadCount:    0,

    // Création réseau
    showCreateNetwork: false,
    newNetwork: { name: '', description: '', is_public: false },
    creatingNetwork: false,
    createNetworkError: '',

    newMessage:       '',
    newProposal:      { title: '', description: '', options: ['', ''], days_open: 7, quorum: 50 },
    showProposalForm: false,
    dirQuery:         '',
    sending:          false,

    async init() {
      await Promise.all([
        this.loadActivity(),
        this.loadMessages(),
        this.loadMembers(),
        this.loadNotifications(),
      ]);
      setInterval(() => this.loadMessages(), 15000);
      setInterval(() => this.loadNotifications(), 30000);
      this.$watch('activeTab', tab => this._tabChanged(tab));
    },

    async api(path, opts = {}) {
      const res = await fetch(BASE + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      return res.json();
    },

    async switchToNetwork(networkId) {
      await this.api('/civium/api/network/switch', {
        method: 'POST',
        body: JSON.stringify({ network_id: networkId }),
      });
      window.location.reload();
    },

    async createNetwork() {
      if (!this.newNetwork.name.trim()) return;
      this.creatingNetwork = true;
      this.createNetworkError = '';
      try {
        const res = await this.api('/civium/api/network/create', {
          method: 'POST',
          body: JSON.stringify(this.newNetwork),
        });
        if (res.ok) {
          window.location.reload();
        } else {
          this.createNetworkError = res.message || res.error || 'Erreur lors de la création.';
        }
      } catch (e) {
        this.createNetworkError = 'Erreur réseau.';
      } finally {
        this.creatingNetwork = false;
      }
    },

    async loadActivity() {
      // Utilise les notifications comme fil d'activité pour l'instant
      const data = await this.api('/civium/api/notifications');
      this.activity = Array.isArray(data) ? data : [];
    },

    async loadMessages() {
      const data = await this.api('/civium/api/messages');
      this.messages = Array.isArray(data) ? data : [];
    },

    async loadMembers() {
      const data = await this.api('/civium/api/members');
      this.members = Array.isArray(data) ? data : [];
    },

    async loadProposals() {
      const data = await this.api('/civium/api/proposals');
      this.proposals = Array.isArray(data) ? data : [];
    },

    async loadNotifications() {
      const data = await this.api('/civium/api/notifications');
      if (Array.isArray(data)) {
        this.notifications = data;
        this.unreadCount = data.filter(n => !n.read_flag).length;
      }
    },

    async searchDir() {
      const data = await this.api('/civium/api/directory?q=' + encodeURIComponent(this.dirQuery));
      this.dirEntries = Array.isArray(data) ? data : [];
    },

    async sendMessage() {
      if (!this.newMessage.trim()) return;
      this.sending = true;
      await this.api('/civium/api/message', { method: 'POST', body: JSON.stringify({ body: this.newMessage }) });
      this.newMessage = '';
      await this.loadMessages();
      this.sending = false;
    },

    async createProposal() {
      if (!this.newProposal.title.trim()) return;
      this.sending = true;
      await this.api('/civium/api/proposal', { method: 'POST', body: JSON.stringify(this.newProposal) });
      this.showProposalForm = false;
      this.newProposal = { title: '', description: '', options: ['', ''], days_open: 7, quorum: 50 };
      await this.loadProposals();
      this.sending = false;
    },

    async castVote(proposalId, optionIdx) {
      await this.api('/civium/api/vote', { method: 'POST', body: JSON.stringify({ proposal_id: proposalId, option_idx: optionIdx }) });
      await this.loadProposals();
    },

    async markRead(notif) {
      if (notif.read_flag) return;
      notif.read_flag = true;
      this.unreadCount = Math.max(0, this.unreadCount - 1);
      await this.api('/civium/api/notifications/read', { method: 'POST', body: JSON.stringify({ id: notif.id }) });
    },

    async markAllRead() {
      await this.api('/civium/api/notifications/read', { method: 'POST', body: JSON.stringify({}) });
      this.notifications.forEach(n => n.read_flag = true);
      this.unreadCount = 0;
    },

    kindIcon(kind) {
      const icons = {
        member_joined:    '👤',
        message_posted:   '💬',
        proposal_created: '🗳',
        vote_cast:        '✅',
        document_created: '📄',
      };
      return icons[kind] ?? '🔔';
    },

    formatDate(val) {
      if (!val) return '';
      const d = new Date(val.includes('T') ? val : val + 'Z');
      return d.toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' });
    },

    async _tabChanged(tab) {
      if (tab === 'gouvernance') await this.loadProposals();
      if (tab === 'annuaire')    await this.searchDir();
    },
  };
}
</script>
<script defer
  src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
  integrity="sha384-9Ax3MmS9AClxJyd5/zafcXXjxmwFhZCdsT6HJoJjarvCaAkJlk5QDzjLJm+Wdx5F"
  crossorigin="anonymous"></script>
</body>
</html>
