<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ @title }}</title>
  <link rel="icon" href="{{ @BASE }}/public/img/favicon.svg" type="image/svg+xml">
  <script defer
    src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
    integrity="sha384-9Ax3MmS9AClxJyd5/zafcXXjxmwFhZCdsT6HJoJjarvCaAkJlk5QDzjLJm+Wdx5F"
    crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      text-decoration: none;
      color: inherit;
    }
    .logo img { height: 32px; }
    .logo-name { font-size: 1.4rem; font-weight: 700; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.5; }
    .alert {
      padding: 0.875rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .alert-success { background: #14532d22; border: 1px solid #16a34a55; color: #4ade80; }
    .alert-error   { background: #7f1d1d22; border: 1px solid #dc262655; color: #f87171; }
    label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; }
    input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus { border-color: #6366f1; }
    input[type="email"]::placeholder { color: #475569; }
    button[type="submit"] {
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #4f46e5; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: default; }
    .back { margin-top: 2rem; text-align: center; font-size: 0.875rem; color: #64748b; }
    .back a { color: #6366f1; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
    .tab-nav { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #2d3148; }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #64748b;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: #6366f1; }
    .tab-btn.active { color: #6366f1; border-bottom-color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card" x-data="authApp()">
    <a class="logo" href="{{ @BASE }}/">
      <img src="{{ @BASE }}/public/img/civium_logo.svg" alt="Civium">
      <span class="logo-name">Civium</span>
    </a>

    <!-- Onglets -->
    <nav class="tab-nav">
      <button class="tab-btn" :class="{ active: tab === 'magic' }" @click="tab='magic'">Lien magique</button>
      <button class="tab-btn" :class="{ active: tab === 'password' }" @click="tab='password'">Mot de passe</button>
    </nav>

    <check if="{{ @erreur }}">
      <true><div class="alert alert-error">{{ @erreur_msg }}</div></true>
      <false></false>
    </check>
    <div class="alert alert-error" x-show="errMsg" x-text="errMsg" style="display:none"></div>
    <div class="alert alert-success" x-show="okMsg" x-text="okMsg" style="display:none"></div>

    <!-- Onglet lien magique -->
    <template x-if="tab==='magic' && !sent">
      <div>
        <h1>Connexion</h1>
        <p class="subtitle">Entrez votre adresse e-mail. Nous vous enverrons un lien de connexion à usage unique.</p>
        <form @submit.prevent="submitMagic">
          <label for="email_magic">Adresse e-mail</label>
          <input type="email" id="email_magic" x-model="email" placeholder="vous@exemple.com" required autofocus>
          <button type="submit" :disabled="loading || !email">
            <span x-text="loading ? 'Envoi en cours…' : 'Envoyer le lien'"></span>
          </button>
        </form>
      </div>
    </template>

    <template x-if="tab==='magic' && sent">
      <div>
        <div class="alert alert-success">
          Lien envoyé ! Vérifiez votre boîte mail et cliquez sur le lien pour vous connecter.
        </div>
        <p class="subtitle">Le lien expire dans 15 minutes. Si vous ne le recevez pas, vérifiez vos spams.</p>
        <button type="button" style="width:100%;margin-top:1rem;padding:0.75rem;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;color:#94a3b8;cursor:pointer;font-size:0.9rem;" @click="sent=false;email=''">Utiliser une autre adresse</button>
      </div>
    </template>

    <!-- Onglet mot de passe -->
    <template x-if="tab==='password'">
      <div>
        <h1 x-text="pwMode==='register' ? 'Créer un compte' : 'Connexion'"></h1>
        <p class="subtitle" x-text="pwMode==='register' ? 'Choisissez un mot de passe pour créer votre compte et votre premier réseau.' : 'Connectez-vous avec votre adresse e-mail et votre mot de passe.'"></p>
        <form @submit.prevent="submitPassword">
          <label for="email_pw">Adresse e-mail</label>
          <input type="email" id="email_pw" x-model="email" placeholder="vous@exemple.com" required>
          <div style="margin-top:1rem">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" x-model="password" placeholder="8 caractères minimum" required minlength="8" style="width:100%;padding:.75rem 1rem;background:#0f1117;border:1px solid #2d3148;border-radius:8px;color:#e2e8f0;font-size:1rem;outline:none;margin-top:0">
          </div>
          <button type="submit" :disabled="loading || !email || password.length < 8">
            <span x-text="loading ? 'En cours…' : (pwMode==='register' ? 'Créer mon compte' : 'Se connecter')"></span>
          </button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:#64748b">
          <span x-show="pwMode==='login'">Pas encore de compte ?
            <a href="#" @click.prevent="pwMode='register'" style="color:#6366f1">Créer un compte</a>
          </span>
          <span x-show="pwMode==='register'">Déjà un compte ?
            <a href="#" @click.prevent="pwMode='login'" style="color:#6366f1">Se connecter</a>
          </span>
        </p>
      </div>
    </template>

    <div class="back"><a href="{{ @BASE }}/">&larr; Retour au site</a></div>
  </div>

  <script>
  const BASE_URL = '{{ @BASE }}';
  const CSRF_TOKEN = '{{ @csrf_token }}';
  function authApp() {
    return {
      tab: 'magic',
      email: '',
      password: '',
      loading: false,
      sent: false,
      errMsg: '',
      okMsg: '',
      pwMode: 'login',

      async submitMagic() {
        this.loading = true; this.errMsg = '';
        try {
          const r = await fetch(BASE_URL + '/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: this.email, _csrf: CSRF_TOKEN }),
          });
          const d = await r.json();
          if (d.status === 'lien_envoye') {
            this.sent = true;
          } else if (d.error === 'trop_de_demandes') {
            this.errMsg = 'Trop de demandes. Veuillez patienter avant de réessayer.';
          } else {
            this.errMsg = d.error === 'email_invalide' ? 'Adresse e-mail invalide.' : 'Erreur : ' + (d.error ?? 'inconnue');
          }
        } catch { this.errMsg = 'Impossible de contacter le serveur.'; }
        finally { this.loading = false; }
      },

      async submitPassword() {
        this.loading = true; this.errMsg = '';
        try {
          const r = await fetch(BASE_URL + '/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: this.email, password: this.password, mode: 'password', _csrf: CSRF_TOKEN }),
          });
          const d = await r.json();
          if (d.status === 'connecte' || d.status === 'compte_cree') {
            window.location.href = BASE_URL + '/network';
          } else if (d.error === 'identifiants_invalides') {
            this.errMsg = 'Email ou mot de passe incorrect.';
          } else if (d.error === 'mot_de_passe_trop_court') {
            this.errMsg = 'Le mot de passe doit contenir au moins 8 caractères.';
          } else {
            this.errMsg = 'Erreur : ' + (d.error ?? 'inconnue');
          }
        } catch { this.errMsg = 'Impossible de contacter le serveur.'; }
        finally { this.loading = false; }
      },
    };
  }
  </script>
</body>
</html>
