<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ @titre }} — Civium</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="text-center max-w-md">
    <div class="text-3xl font-bold text-indigo-700 mb-6">Civium</div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <check if="{{ @show_create }}">
        <true>
          <div class="text-4xl mb-4">👋</div>
          <h1 class="text-lg font-semibold text-gray-800 mb-3">Bienvenue sur Civium</h1>
          <p class="text-sm text-gray-500 mb-6">Vous n'êtes encore membre d'aucun réseau. Accédez à l'application pour créer votre réseau ou en rejoindre un.</p>
          <a href="{{ @base }}/app"
             class="inline-block w-full py-2.5 bg-indigo-600 text-white text-sm font-semibold rounded-xl hover:bg-indigo-700 transition-colors mb-3">
            Ouvrir l'application →
          </a>
        </true>
        <false>
          <div class="text-4xl mb-4">🔒</div>
          <h1 class="text-lg font-semibold text-gray-800 mb-3">{{ @titre }}</h1>
          <p class="text-sm text-gray-500 mb-6">{{ @message }}</p>
        </false>
      </check>
      <a href="{{ @base }}/auth/deconnexion"
         class="text-sm text-indigo-600 hover:underline">Se déconnecter</a>
    </div>
  </div>
</body>
</html>
