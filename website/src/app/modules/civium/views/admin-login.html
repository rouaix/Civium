<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ @title }}</title>
  <link rel="icon" href="{{ @BASE }}/public/img/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117; color: #e2e8f0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px;
      padding: 2.5rem; width: 100%; max-width: 400px;
    }
    .logo {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 2rem; text-decoration: none; color: inherit;
    }
    .logo img { height: 32px; }
    .logo-name { font-size: 1.4rem; font-weight: 700; }
    .badge {
      font-size: 0.72rem; background: #7c3aed22; border: 1px solid #7c3aed55;
      color: #a78bfa; padding: 0.2rem 0.6rem; border-radius: 999px;
      margin-left: auto;
    }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.75rem; }
    .alert-error {
      padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.25rem;
      font-size: 0.875rem;
      background: #7f1d1d22; border: 1px solid #dc262655; color: #f87171;
    }
    .field { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.4rem; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 0.7rem 0.9rem;
      background: #0f1117; border: 1px solid #2d3148; border-radius: 8px;
      color: #e2e8f0; font-size: 0.95rem; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }
    button[type="submit"] {
      width: 100%; margin-top: 0.5rem; padding: 0.75rem;
      background: #6366f1; color: #fff; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <a class="logo" href="{{ @BASE }}/">
      <img src="{{ @BASE }}/public/img/civium_logo.svg" alt="Civium">
      <span class="logo-name">Civium</span>
      <span class="badge">Admin</span>
    </a>

    <h1>Connexion administration</h1>

    <check if="{{ @login_error }}">
      <true><div class="alert-error">{{ @login_error }}</div></true>
      <false></false>
    </check>

    <form method="POST" action="{{ @BASE }}/admin/login">
      <div class="field">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Se connecter</button>
    </form>
  </div>
</body>
</html>
