GET /admin/hub/main=AdminController->hubMain
GET /admin/hub/members=AdminController->hubMembers
POST /admin/hub/kick=AdminController->hubKick
GET /admin/hub/messages=AdminController->hubMessages
DELETE /admin/hub/message=AdminController->hubDeleteMessage
GET /admin/web-users=AdminController->webUsers
DELETE /admin/web-user=AdminController->webUserDelete
DELETE /admin/network=AdminController->networkDelete
DELETE /admin/alert=AdminController->alertDelete
POST /admin/hub/rename=AdminController->hubRename
