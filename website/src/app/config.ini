[globals]
DEBUG=0
UI=app/modules/pages/views/|app/modules/civium/views/
AUTOLOAD=app/modules/pages/controllers/|app/modules/rcc/controllers/|app/modules/civium/controllers/|app/modules/activitypub/controllers/|app/modules/hub/controllers/|models/

; White-label — personnalisation de l'instance (branding + limites de licence)
WL_APP_NAME=Civium
WL_APP_TAGLINE=Votre réseau souverain
WL_LICENSE_TIER=open
WL_MAX_NETWORKS=0
WL_MAX_MEMBERS=0
ADMIN_TOKEN=
; Identifiants du panneau d'administration (navigateur)
; ADMIN_USER : nom d'utilisateur
; ADMIN_PASS : hash bcrypt — générer avec : php -r "echo password_hash('monMotDePasse', PASSWORD_BCRYPT);"
ADMIN_USER=
ADMIN_PASS=
; Email de l'administrateur du réseau principal web (utilisé pour le premier compte admin)
ADMIN_EMAIL=

; Base de données MySQL — à surcharger dans config.local.ini
DB_HOST=
DB_NAME=civium
DB_USER=
DB_PASS=
APP_URL=https://www.rouaix.com/civium

; Email — alertes fraude
SMTP_HOST=
SMTP_PORT=587
SMTP_SCHEME=tls
SMTP_USER=
SMTP_PASS=
MAIL_FROM=noreply@rouaix.com
MAIL_FROM_NAME=Civium RCC

